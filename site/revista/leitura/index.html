cation/271982862_A_Review_of_ Detection_Evaluation_and_Repair_Technolo­ gy_for_Hydraulic_Concrete_Structures 41. Ecuador drops dam dispute with China, but project remains contentious | Dialogue Earth, acessado em março 17, 2026, https://dialogue.ear­ th/en/energy/ecuador-drops-dam-dispute-with­ -china-but-project-remains-contentious/", "12 ■ REVISTA IRC ■ JUNHO DE 2026 MEMÓRIA TÉCNICA Histórico da tecnologia do concreto massa no brasil ENGº. EPAMINONDAS MELO DO AMARAL FILHO1 Editorial A Revista IRC tem a satisfação de reproduzir nes­ te número o artigo “História do Concreto Mas­ sa no Brasil”, de autoria do engenheiro Epaminon­ das de Melo do Amaral, publicado originalmente em 1981. Mais do que um simples registro histórico, o texto representa um dos primeiros esforços siste­ máticos de documentar a evolução da tecnologia do concreto massa aplicada às barragens brasilei­ ras, em um momento em que o país já acumulava uma experiência singular no cenário internacional. Quando este artigo foi escrito, o Brasil encon­ trava-se no auge de um ciclo extraordinário de implantação de grandes aproveitamentos hidrelé­ tricos. Obras como Furnas, Jupiá, Ilha Solteira, Ma­ rimbondo, Sobradinho, São Simão, Foz do Areia, Tucuruí e Itaipu haviam transformado o país em um dos maiores laboratórios mundiais de enge­ nharia de barragens. Não se tratava apenas da construção de grandes estruturas, mas do desen­ volvimento de conhecimento próprio em dosagem de concretos, controle térmico, instrumentação, métodos construtivos, planejamento de concreta­ gens em larga escala e monitoramento de compor­ tamento estrutural. Em diversos desses campos, a experiência brasileira alcançou reconhecimento internacional e passou a ser observada e estudada por profissionais de vários países. Essa posição de destaque não decorreu apenas da dimensão das obras executadas, mas da capa­ cidade de integrar pesquisa, projeto, construção e operação em um ambiente de permanente ino­ vação tecnológica. Ao longo das décadas de 1960, 1970 e 1980, consolidou-se uma verdadeira escola brasileira de engenharia de barragens, apoiada por instituições como Furnas, Eletrobras, Chesf, Cemig, Cesp, IPT, universidades e empresas de projeto e construção que se tornaram referências mundiais. O volume de concreto massa lançado em obras brasileiras, associado à diversidade de condições geológicas, climáticas e operacionais enfrentadas, produziu uma base de conhecimento raramente encontrada em outros países. O artigo de Epaminondas evidencia também uma percepção que se mostraria extremamente importante: a necessidade de preservar a memó­ ria técnica desse patrimônio de conhecimento. À medida que novas obras eram concluídas e novas gerações de engenheiros ingressavam no setor, tornava-se evidente que a experiência acumulada não poderia permanecer dispersa em relatórios, arquivos corporativos e registros individuais. Essa percepção motivou, alguns anos mais tar­ de, um dos mais importantes projetos de documen­ tação técnica já realizados na engenharia brasilei­ ra: a publicação da obra Concreto Massa no Brasil: Memória Técnica (1989). Concebida com o apoio da Memória da Eletricidade, Eletrobras, CBDB e IBRA­ CON, a obra reuniu, de forma inédita, a experiência de vinte e quatro das mais representativas barra­ gens brasileiras, registrando não apenas dados de projeto e construção, mas também as soluções tec­ nológicas, os desafios enfrentados e as lições apren­ didas ao longo de décadas de desenvolvimento. Nesse esforço coletivo destaca-se a liderança do engenheiro Walton Pacelli de Andrade, cuja atuação foi fundamental para transformar um vasto acervo disperso de conhecimento técnico em uma referência histórica e documental de alcance nacional. Sob sua coordenação, a obra consolidou depoimentos, registros institucio­", "JUNHO DE 2026 ■ REVISTA IRC ■ 13 nais e informações técnicas que, de outra forma, estariam sujeitas ao esquecimento. Mais do que um livro, Concreto Massa no Brasil tornou-se o principal documento de memória da engenharia brasileira de barragens e uma referência obriga­ tória para pesquisadores, projetistas e profissio­ nais do setor. Ao republicar o texto de Epaminondas de Melo do Amaral, a Revista IRC procura não apenas homenagear um pioneiro esforço de registro his­ tórico, mas também reafirmar a importância da preservação da memória técnica da engenharia nacional. O artigo que segue permite ao leitor re­ visitar o momento em que a história do concreto massa brasileiro começava a ser escrita por aque­ les que a construíram, lançando as bases para ini­ ciativas posteriores que hoje constituem parte es­ sencial do patrimônio técnico e científico do país.", "14 ■ REVISTA IRC ■ JUNHO DE 2026 I. Introdução I. 1 Transferência da Tecnologia O problema sempre presente nos países em desen­ volvimento é como desenvolver suas tecnologias nos diversos ramos. Raramente essas tecnologias podem ser simplesmente adquiridas de outros pa­ íses: elas em geral têm que se adaptar as condições locais de ambiente e cultura. E isto em geral é feito de forma tal, que um problema local é resolvido, bem ou mal, por um consultor estrangeiro contra­ tado e nada sobra depois do problema resolvido, como aumento do acervo cultural. Várias causas para isto concorrem e a mais importante é que é mais interessante aos países desenvolvidos man­ terem esse status para manterem o mercado. I. 2 Salto de etapas E essa transferência de Tecnologia pode ser feita em prazos curtos, assimilando-se adaptando-se a experiência estrangeira? Resumindo: é possível saltar etapas intermediárias? Ou é necessário fazer a base cultural percorrendo passo a passo o longo caminho da experimentação, formação de profis­ sionais, laboratórios, literatura técnica, etc.? Como regra geral, a experiência mostra que é dificílimo pular as etapas intermediárias, sem deixar vazios na estrutura cultural que se está estabelecendo. Um caso favorável ocorrido no Brasil foi justamen­ te o da Tecnologia do Concreto Massa. As etapas intermediárias foram todas transpostas, sem que o contexto cultural fosse afetado. Veremos depois como foi isto feito, a quem devemos os maiores méritos e que homens fizeram esse feito. II. Estado da arte em 1965 Considero 1965 o ano base, o marco zero do nasci­ mento da Tecnologia Avançada. Neste ano foram lançadas as bases de um edifício gigantesco cultural. II. 1 Qualidade do concreto massa Uns poucos casos de execução com boa técnica já existiam no Brasil. Mas feitos por estrangeiros e sem nada deixarem ao País, além da própria obra feita e da despesa dos gastos feitos com di­ visas caras. 1 Epaminondas Melo do Amaral Filho nasceu em 05 de abril de 1921 e faleceu em 29 de junho de 1998. O Eng. Epaminondas Melo do Amaral Filho formou-se em 1944 no curso de Engenharia Civil da Escola Politécnica da USP. Em 1945 foi engenheiro assistente da Seção de Cálculo de Obras de Arte do DER, onde projetou inúmeras estruturas de pontes, galerias e bueiros. Em abril de 1959 foi eleito Diretor Técnico da Construções e Comércio Camargo Corrêa S/A, onde realizou diversos trabalhos. Em 1978 passou a Consultor Técnico da Construções e Comércio Camargo Corrêa S/A. Em 1992 passou a Consultor Autônomo. Epaminondas Melo do Amaral Filho fez parte de várias Associações como: ACI, IE, ASTM, ex-Presidente e sócio Honorário do IBRACON, ex-presidente e presidente honorário do CBGB, Medalha de mérito pelos relevantes serviços prestados à Engenharia, Arquitetura e Agronomia concedido pelo CONFEA, Presidente do Conselho Técnico da ABCP, entre outros. Proferiu diversos cursos e palestras inclusive no exterior e teve uma lista enorme de publicações sobre: Produção de Concreto Estrutural, Execução de Obras em Concreto Massa, Pontes – Métodos Construtivos, Estruturas de Concreto do Metrô de São Paulo em Águas Agressivas, Concreto Rolado, Concreto de Alta Resistência, Durabilidade dos Concretos, Recuperações e Aplicações em Estruturas de Concreto de Alto Desempenho, entre outros.", "JUNHO DE 2026 ■ REVISTA IRC ■ 15 Certos centros de pesquisa como o IPT, INT e IRGS haviam feito um progresso razoável na tec­ nologia do concreto armado. Mas o concreto massa ainda era um desconhecido. Desconhecido e não temido, pois dele não conhecía­ mos os perigos que uma técnica inadequada aduziria. II. 2 Consumo de cimento O problema de consumo alto de cimento era a principal causa dos insucessos de execução do concreto massa no Brasil. E também no exterior. Se compararmos os consumos atuais com os dessa época, verificaremos que estamos abaixo da meta­ de. Nessa época só havia preocupações com o “teor mínimo de cimento” a fixar. Os fenômenos térmicos eram minimizados, porque desconhecidos. II. 3 Laboratórios nacionais Não tínhamos um só laboratório no Brasil, hábil a fazer determinações de reatividades, deformações térmicas, tensões térmicas, relaxação de tensões, etc.. Nem mesmo conhecíamos adequadamente o uso de pozolanas ou fly-ashes. III. O nascimento da tecnologia brasileira do concreto massa III. 1 O grande mestre prof. Dr. Roy Carlson Apesar do extremo carinho com que o concre­ to da Usina Hidrelétrica de Jupiá estava sendo construído, houve a ocorrência de fissuras em grande escala. FOTO: ACERVO MEMÓRIA DA ELETRICIDADE", "16 ■ REVISTA IRC ■ JUNHO DE 2026 Qual a causa? Talvez baixa aderência do cascalho de quartzo cal­ cedônia à argamassa? Ou a areia de módulo de fi­ nura não ideal? E assim um sem número de causas possíveis foram aventadas. Mas a única medida adequada a tomar foi en­ tão tomada. Fizemos contato com o já então famo­ so Prof. Roy W. Carlson, então um jovem pesquisa­ dor, na casa dos 66 anos (!). A carta resposta do Prof. Carlson foi como uma janela aberta para a luz. Nela ele sugeria a possibi­ lidade de serem as causas o excesso de cimento e a natureza geológica do agregado. E pela primeira vez enxergávamos, mostrado pelas luzes do gran­ de mestre, os escuros interiores de um concreto massa, com seus problemas térmicos, altos módu­ los de elasticidade, baixa fluência, baixa relaxação de tensões, baixo alongamento de ruptura, alto ín­ dice de expansão térmica e outros fatores, até en­ tão desconhecidos. Desconhecidos mas perigosos e presentes, fa­ zendo ver a sua presença pelos efeitos danosos. E ainda a sugestão de possível reatividade en­ tre o agregado e os álcalis do cimento. E ainda mais como combater esses efeitos. Após essa carta, veio ao Brasil o Prof. Carlson na sua 1a. viagem das 20 que já fez até hoje. Após esta visita fomos alguns de nós fazer os primeiros estágios de aprendizado dessa difícil e maravilhosa disciplina, que é a Tecnologia do Con­ creto Massa. Se bem que não um especialista em Concreto, pois era engenheiro mecânico e eletricista, mas graças às suas excepcionais visão e inteligência, o engenheiro Francisco Lima de Souza Dias Filho, en­ tão Presidente da Cesp, foi quem deu o apoio para a arrancada para o desenvolvimento tecnológico. III. 2 O concreto de Ilha Solteira e Jupiá Estava nessa ocasião em fase já muito adianta­ da a Usina de Jupiá, e Ilha Solteira apenas come­ çando. Os estudos de reatividade dos cascalhos mos­ traram ser ele terrivelmente deletério e trazer ris­ cos. Já estávamos usando fly-ash do Sul desde o início, de forma que este fenômeno felizmente já estava razoavelmente dominado. Foi então pesquisada jazida de argila, que calci­ nada desse uma pozolana confiável. Estes estudos e pesquisas orientados pelo Mes­ tre Carlson, conduziram à produção de uma extra­ ordinária pozolana tida por muitos técnicos, como de melhor qualidade já produzida no mundo. Nomes hoje conhecidos no Brasil todo aparece­ ram nessa ocasião. Jovens brilhantes nessa ocasião, hoje já não tão jovens, mas mais brilhantes ainda despontaram os nomes de Darcy Andrade de Almeida, Francisco R. Andriolo, Adhemar Sonoda, Luércio Scandiuzzi. Wladimir Antonio Paulon, Miguel Normando Ab­ dalla Saad, Heraldo S. Gitahy entre outros. Por sua vez, dos esforços do projetista, apareceram com igual valor, entre outros, Henrique Herweg. Horst Eckschimidt, Selmo Kuperman e Ferdinand Bu­ dwegde. Todos esses nomes citados e outros que cometo a injustiça não citar, foram instruídos, ins­ pirados e conduzidos pelo Prof. Carlson. Qual um novo Midas, o Dr. Carlson tornava-os preciosos com simples toque de sua influência e personalidade. Se bem que feitos quase ao mesmo tempo, 40 anos de Tecnologia separam Ilha Solteira de Jupiá. III.3 A introdução à Tecnologia Avançada Felizmente para País, os dirigentes das outras con­ cessionárias tiveram a visão de, na mesma ocasião, solicitar o auxílio do Prof. Carlson na formação dos seus engenheiros mais promissores. Flávio Henrique da Silva Lyra, John Cotrin, Camilo Penna e outros, deram ensejo a que enge­ nheiros da estatura de Walton Pacelli de Andrade, Humberto Rodrigues Gama, Luiz Carlos Ferreira de Souza e outros, aparecessem e se tornassem nos mestres que hoje são. Não parou aí a cadeia de influência do Prof. Carlson. Grandes engenheiros de hoje, alguns até sem terem feito estágio nos USA, sofreram a poderosa influência do Prof. Carlson. Entre outros muitos, podemos citar Simão Priszkulnik, Carlos Alberto Bandeira de Mello, An­ tonio Carlos Tatit Holtz, Rubens Vianna de Andra­ de, Yasuko Tezuka, Paulo Roberto do Lago Helene, Wanderley G. Corrêa. Mesmo hoje ainda temos jovens extremamen­ te talentosos, estagiando em Berkeley e sob sua orientação direta, como Paulo Monteiro e Vicen­ te Gorski. Há poucos meses, recebemos de volta", "JUNHO DE 2026 ■ REVISTA IRC ■ 17 ­Harold Hirth, que foi a Berkeley, onde tirou com brilhantismo seu título de Ph.D., sob a orientação dos Profs. Carlson e Polivka. Todos os acima mencionados, e, provavelmente o dobro desse número, que injustamente não men­ cionei, receberam os ensinamentos da Tecnologia Avançada. Alguns destes partiram quase do zero, outros já foram estagiar tendo recebido aqui mesmo uma grande riqueza de conhecimentos fornecidos pe­ los primeiros. III. 4 Formação dos profissionais ­brasileiros A formação dos profissionais brasileiros foi de­ corrente de um processo integrado de estudo de literatura estrangeira existente, estágios nos La­ boratórios de Berkeley-CA,. estágios nos Laborató­ rios do Army Corps of Engineers e visitas a obras americanas do Army Corps of Engineers, Bureau of Reclamation e Tenessee Valley Authority. E mais que tudo isto, a orientação pessoal do Prof. Carlson, e à medida do desenvolvimento dos nossos jovens, contando com o auxílio deles mes­ mos para os menos experientes. Desta forma o processo expandiu-se rapidamente. IV. Crescimento e consolidação da tecnologia brasileira IV. 1 Visitantes estrangeiros no Brasil Dada a complexidade da Disciplina em pauta, o Prof. Carlson julgou útil trazer os professores de sua equipe de Berkeley e alguns consultores que para ele trabalhavam. Tivemos assim visitas de Edward Wilson, autor de um excelente programa de elementos finitos para tensões e deformações térmicas. Jerome Raphael, um dos maiores mes­ tres em projeto de barragens, Milos Polivka, pro­ vavelmente o mais competente pesquisador de laboratório que já se conheceu, David Pirtz, um pe­ rito raro em instrumentação, P.K. Mehta, um espe­ cialista em química de cimento, Orville Borge, um mestre em pesquisa de creep e relaxação, Lewis Tuthill, um extraordinário perito em técnicas exe­ cutivas, entre outros. Sem contar o apoio que os outros amigos do Prof. Carlson nos deram nos USA, tais como Ray­ mond Davis, Donald Houghton. Walter Price. D.W. Basgen, James A. Rohdes, Edward A. Abdun-Nur. Robert W. Cannon outros. Bastava a recomendação do Prof. Carlson para termos a compreensão, conselho e ensinamentos de qualquer desses mestres. IV. 2 Estágios nos centros culturais Os estágios continuam e há pouco fomos pesqui­ sar lá a utilização de agregados aparentemente in­ servíveis, por apresentarem altíssimo Los Angeles. Um jovem engenheiro da Eletronorte fez há pouco um estágio em Willow Creek Dam, vendo o que de mais moderno há em concreto rolado. Re­ firo-me a Francisco Gladston Holanda, que é uma promessa brilhante da nossa Engenharia. IV. 3 Visitas as obras Temos visitado e continuamos a visitar as obras que tem novidades a apresentar. É verdade que o estado técnico em que os nos­ sos engenheiros hoje estão, nos capacita a aprovei­ tar muito mais cada visita. IV. 4 A dedicação do mestre Carlson ao ­Brasil É surpreendente a análise da atitude do prof. Carl­ son em relação ao nosso País. Tudo o que ele fez, transcende longe a obriga­ ção a que está sujeito um consultor capaz e hones­ to. Dele recebemos não só isto, mas um amor ao Brasil que não é comum vermos, mesmo nos bra­ sileiros. O Prof. Carlson criou Tecnologia Brasileira do Concreto Massa. Ele criou o corpo técnico. Um corpo técnico competente, motivado, imbuído pro­ fundamente do sentimento de Ética. Apesar dos extraordinários feitos técnicos do Prof. Carlson no Brasil, considero sua maior cons­ trução a formação dessa magnífica equipe técnica, que hoje possuímos. V. O estado atual da tecnologia brasileira V. 1 A equipe técnica brasileira pode ser comparada com qualquer equipe técnica de concreto do mundo. E em geral levando vantagem.", "18 ■ REVISTA IRC ■ JUNHO DE 2026 Os trabalhos apresentados nos Congressos, em especial do Ibracon, já constituem um rico acervo técnico, com experiência e materiais nacionais. V.2 A confiabilidade dos laboratórios ­nacionais Temos vários laboratórios de concreto no Brasil, bem equipados e com pessoal competente. Mas no capítulo Concreto Massa podemos di­ zer que os Laboratórios de Ilha Solteira, Itumbiara, Itaipú e Tucuruí estão aptos a fazer qualquer en­ saio necessário a um projeto de barragem. São absolutamente confiáveis e bem equipados. Note-se que há menos de dois lustros, tivemos que mandar de avião, pedra, areia, cimento e pozolana para fazer os ensaios de Ilha Solteira. E era necessário. Não tínhamos como determinar com segurança, a fluência, relaxação, alongamento de ruptura, módulo de deformação, deformação autógena, re­ atividade álcali-agregado por petrografia, condu­ tibilidade e difusibilidade térmica, coeficiente de dilatação linear, etc. Hoje, fazemos qualquer desses ensaios em qualquer dos laboratórios citados. V.3 Qualidade das Obras Brasileiras Este aprimoramento do nível técnico dos enge­ nheiros e a existência de laboratórios nacionais idôneos estão permitindo uma melhoria de quali­ dade nas obras ano após ano. Itaipú foi um marco de qualidade. Nela, tabus fo­ ram quebrados e novas técnicas foram introduzidas.", "JUNHO DE 2026 ■ REVISTA IRC ■ 19 FOTO: ACERVO MEMÓRIA DA ELETRICIDADE Tudo isto apoiado solidamente por uma equipe de engenharia de concreto, totalmente nossa, contando, é verdade, ainda com a ajuda do Prof. Roy Carlson. Em Tucuruí já nos valemos das experiências somadas de Ilha Solteira, Itumbiara e Itaipú. Por essa razão, em função da generosidade dos enge­ nheiros brasileiros em cederem suas informações aos colegas, em Tucuruí estamos com o menor consumo de cimento por m3 do mundo e o mais baixo coeficiente de variação. V.4 Continuação do crescimento tecnológico O processo de crescimento em conhecimento é contínuo. É animador ver o nível dos trabalhos que os colegas de todas as partes do país apresen­ tam nos Congressos. E, como já disse, a generosidade com que cada detentor de uma novidade se apressa em comuni­ cá-la aos colegas. VI. Perspectivas futuras da tecnologia brasileira Apesar da difícil conjuntura econômica mundial, só podemos encarar as perspectivas futuras com otimismo. A equipe de concreto do Brasil é composta de jovens com idade variando de 25 a 40 anos. E em número animador, de algumas dezenas. E ainda mais, todos com o mesmo louvável espírito de ho­ nestidade técnica e colaboração. Seremos em prazo curto exportadores de técnica, pagando ao mundo, um pouco do que o Prof. Roy Carlson fez por nós.", "20 ■ REVISTA IRC ■ JUNHO DE 2026 Roy Carlson antes das barragens: infância, física e os primeiros problemas de engenharia Em Comemoração ao 85º Aniversário do Dr. Roy W. Carlson por Roy W. Carlson Editado pelo Prof. Milos Polivka e Prof. Paulo Monteiro com a assistência do Escritório de Publica­ ções, Faculdade de Engenharia Família e Primeiros Anos O s pais de Roy Carlson nasceram na Suécia. Quando criança, seu pai mudou-se para Or­ tonville, Minnesota, enquanto sua mãe mudou-se para esta mesma cidade aos 15 anos. Os dois se co­ nheceram e se casaram quando o pai de Roy tinha cerca de 22 anos e sua mãe 20. Roy foi o quinto dos oito filhos do casal (seis meninos e duas meninas). Dois de seus irmãos vivem até hoje (1985). Durante toda a sua infância, muitos membros da família de Roy sofreram com infortúnios e problemas de saúde. Três de seus irmãos morre­ ram ainda na infância. Seu pai, que contraiu tu­ berculose em 1910, ficou inválido até vir a falecer em 1914. E seu tio Olaf também foi acometido de tuberculose, da qual veio a falecer em 1929. Uma das lembranças mais antigas de Roy re­ monta a 1909, quando as árvores de eucalipto da Austrália ficaram conhecidas como as “árvores do futuro“. Essas árvores eram consideradas um bom investimento, por serem de rápido cresci­ mento. Sempre disposto a tentar algo novo, o pai de Roy comprou mudas de diversas variedades de eucalipto, ou “gum trees“, e Roy ajudou seu pai a plantar mudas de “red gum“ e “blue gum“. Depois disso, as árvores realmente cresceram rápido, mas eram inúteis para uso como madeira porque seus troncos empenavam e rachavam. Foi apenas mui­ tos anos depois que a madeira tornou-se valiosa novamente como fonte de lâminas (“veneer“). REMINISCÊNCIAS – Parte 1", "JUNHO DE 2026 ■ REVISTA IRC ■ 21 Ensino Médio As memórias seguintes de Roy remontam aos seus anos na “Kingsburg Joint Union High Scho­ ol“, quando ele exibiu talento para matemática e ciências. Certa vez, quando um prêmio foi ofere­ cido a quem conseguisse resolver um problema difícil de geometria, Roy ficou acordado à noite até resolver o problema. Aprendeu com essa ex­ periência que poderia resolver problemas con­ fiando-os ao subconsciente antes de ir dormir. Diante de um problema técnico, ele revisava to­ dos os fatos antes de ir dormir e então deixava a solução vir até ele pela manhã. Foi também enquanto Roy cursava o ensino médio em Kingsburg que ele enfrentou um pro­ blema mais prático: uma invasão de galinhas na horta de sua família. Enquanto as galinhas do vi­ zinho estavam ocupadas comendo a maior parte da comida na horta dos Carlson, Roy tentava ser mais esperto que elas. Ele primeiro tentou plan­ tar alimentos que não eram atraentes para as ga­ linhas, mas isso resultou em uma colheita muito limitada. (Ele plantou rabanetes e cenouras, por exemplo, e foi graças às galinhas que ele obteve mais do que a sua cota de vitamina A.) Quando Roy se cansou das restrições sobre o que podia plantar, decidiu agir contra as galinhas. Seu novo plano exigia grãos de milho, peque­ nos pedaços de barbante e alguns pedaços de pa­ pel. Roy amarrou uma ponta do barbante a um grão de milho e a outra ponta a um pedaço de papel. Ele então colocou os grãos em sua horta onde as galinhas pudessem comê-los. Mais tarde, quando o vizinho de Roy percebeu que havia pe­ daços de papel presos ao bico das suas galinhas, ele pegou um deles para investigar. Ele ficou sur­ preso ao encontrar um bilhete no bico da galinha, e mais surpreso ainda quando leu a mensagem: “Eu visitei a horta dos Carlson“. Enquanto isso, Roy enfrentava outro proble­ ma com galinhas em casa, porque os Carlson não podiam pagar pela ração de suas aves. Tentando encontrar uma maneira de alimentar as galinhas de graça, Roy teve a ideia de cortar as penas de cada uma delas para que não pudessem voar. Ele então soltou suas galinhas no campo de alfafa, onde elas podiam se alimentar da alfafa e dos in­ setos que eram abundantes nesses campos. Como Roy havia aprendido na escola que as galinhas têm uma moela que tritura a comida, ele acredi­ tava que os insetos seriam uma iguaria para as galinhas. Cortar as asas das galinhas acabou tra­ zendo uma vantagem extra para Roy quando ele tinha que reunir as galinhas e devolvê-las ao gali­ nheiro ao final de cada dia. Embora normalmente fosse difícil pegar uma galinha, uma galinha com as asas cortadas em um campo de alfafa era fácil de pegar. Ainda assim, havia um último problema. Com as galinhas soltas no campo de alfafa, como ele iria encontrar os ovos? Ele resolveu esse proble­ ma fazendo ninhos de palha em locais estratégi­ cos do campo e colocando um ovo de vidro em cada ninho. As galinhas então botavam seus ovos nos ninhos de palha. Roy pensou então que uma galinha precisaria ser muito estúpida para pensar que o ovo de vidro era dela, mas afinal foi graças a tamanha estupidez que essa estratégia deu certo. Enquanto Roy estava no ensino médio, a maioria de seus irmãos se destacava nos espor­ tes; Roy, por outro lado, passava grande parte do tempo sonhando acordado. Embora ele fosse indiferente aos esportes, o treinador esportivo escolheu Roy para ser o capitão do time de bei­ sebol da escola. Roy nunca entendeu por que foi escolhido para essa posição, mas ele sentiu que deveria se esforçar e estimular o time em direção à vitória. Descrevendo um jogo de beisebol em particular, Roy lembrou que seu irmão Henry ti­ nha ido rebater cinco vezes e havia conseguido três rebatidas seguras. Roy perguntou a ele: “O que aconteceu com você nas outras duas vezes?“ Tudo o que Henry disse foi: “Você sabe muito so­ bre beisebol, hein.“ Em 1915, Roy e Henry tiveram a sorte de via­ jar com o cunhado deles para a Feira Mundial em São Francisco. Roy lembrava-se da feira como um evento espetacular. Ele e seu irmão ficaram espe­ cialmente impressionados com uma das atrações principais, um piloto acrobata que fazia loops e curvas no ar sobre a Marina. Mal sabiam eles que, em poucos anos, o próprio Henry seria um piloto talentoso, pronto para servir na França durante a Segunda Guerra Mundial. Três anos após a Feira Mundial, quando Roy era um calouro na Universidade de Redlands, um avião pousou em um vinhedo perto da Universi­ dade. Sentado em uma sala de aula na época, Roy", "22 ■ REVISTA IRC ■ JUNHO DE 2026 se juntou aos colegas enquanto eles corriam para a janela. Todos observaram enquanto estudantes no vinhedo limpavam as videiras para fazer uma pista para o avião. Mais tarde, os colegas de Roy mal podiam esperar para lhe contar que o ho­ mem no avião era o seu irmão Henry, que havia pousado e depois decolado novamente sem parar para vê-lo. Universidade de Redlands Várias circunstâncias favoráveis levaram Roy à Universidade de Redlands. Em 1918, durante a Primeira Guerra Mundial, o Exército dos EUA ha­ via estabelecido o SATC, ou Students Army Trai­ ning Corps (Corpo de Treinamento do Exército para Estudantes), para suplementar o exército re­ gular. Este programa permitia que um estudante treinasse com o exército, ganhando US$ 30 por mês enquanto frequentava a faculdade. A Uni­ versidade de Redlands enviou seu gerente de ne­ gócios, George Cortner, para recrutar estudantes com esta oferta do exército. Como a Universidade era Batista, todas as famílias batistas com filhos em idade universitária foram abordadas. Quan­ do Cortner fez a oferta à mãe de Roy, que estava lutando para equilibrar as contas, ela aceitou o acordo avidamente. Roy partiu para a Universidade de Redlands com uniforme do exército, mas ele o usou por apenas um dia. Ele foi dispensado pelo exército porque era 11 dias jovem demais: o programa de­ les era aberto apenas para estudantes que com­ pletariam 18 anos até 12 de setembro, e Roy não faria aniversário até o dia 23 de setembro! Roy teria retornado a Kingsburg então, se não fos­ se por uma inesperada reviravolta dos aconte­ cimentos. Revisando o histórico escolar de Roy no ensino médio, o Sr. Cortner viu que suas con­ quistas em matemática, física e química fariam de Roy um trunfo para a Universidade. Conse­ quentemente, ele providenciou uma bolsa para cobrir a mensalidade de Roy e ofereceu a ele US$ 30 por mês para trabalhar como zelador no Edi­ fício da Administração. Nos anos restantes até a formatura, Roy man­ teve diversos empregos, incluindo um em uma fábrica de manteiga de maçã, onde trabalhava das 16:00 à meia-noite por 25 centavos a hora. Em­ bora essas horas fossem longas, ele ainda assim arranjava tempo para estudar e tirar boas notas. Foi enquanto Roy cursava o último ano na Universidade de Redlands que ele quase se tor­ nou um atleta de sucesso. Ele fazia parte da equi­ pe de natação na época, e seu melhor evento era nadosubmerso por longas distâncias. Roy passou um ano se preparando para competir, trabalhan­ do para expandir sua capacidade pulmonar para um evento que aconteceria em breve. Ao final daquele ano, seu tórax havia se expandido de 10 para quase 18 centímetros, e ele conseguia pren­ der a respiração debaixo d'água por até 3 minutos e 15 segundos. Roy acreditava que poderia que­ brar o recorde mundial com sua habilidade, mas este evento foi removido da competição quando especialistas revelaram os perigos do nado sub­ merso de longa distância. Roy conhecia esses pe­ rigos em primeira mão, pois certa vez ele sofreu com uma dor de cabeça por mais de um dia após um mergulho de 180 pés. Embora sua carreira na natação tenha sido interrompida, o condiciona­ mento físico de Roy lhe serviu bem como alpi­ Imagem criada por IA a partir de", "JUNHO DE 2026 ■ REVISTA IRC ■ 23 nista; ao alcançar uma altitude de mais de 13.000 pés, descobriu que havia vantagem extra em ter uma alta capacidade pulmonar. No Caminho para a Tecnologia do Concreto Southern California Edison Company D epois que Roy se formou na Universidade de Redlands em junho de 1922, Wallace Chadwi­ ck, então um funcionário de confiança da Sou­ thern California Edison Company, conseguiu um emprego para ele em Big Creek. Sem esperar pela cerimônia de formatura, Roy pegou o trem para a cidade de Big Creek e começou a trabalhar como anotador (recorder). Começando com um salário de US$ 110 por mês, foi promovido até chegar a desenhista ganhando US$ 175 por mês. Como sua pensão e moradia custavam apenas US$ 30 por mês, ele conseguia economizar a maior parte do seu salário. Após alguns meses na cidade de Big Creek, Roy foi transferido para o Acampamento 33, pou­ co mais de 12 km de Big Creek, em South Fork, uma das nascentes do rio San Joaquin. A Casa de Força No. 8, que estava localizada neste acam­ pamento, captava água do riacho Big Creek por meio de um túnel e uma comporta de pressão (penstock). A casa de força também ficava na cap­ tação do Túnel No. 3, que transportava água do Big Creek e do SouthFork do rio San Joaquin. Na extremidade a jusante do Túnel No. 3 havia uma comporta de pressão e outra casa de força, a Casa de Força No. 3. Alguns anos depois, quando o rio foi desviado para o Túnel No. 3, Roy teve a chance de estimar o coeficiente de rugosidade das pare­ des do túnel. Coeficiente de Rugosidade do Túnel de Florence Lake Quando chegou ao Projeto Big Creek em 1922, Roy descobriu que a prática padrão lá era atribuir um coeficiente de rugosidade de 0,35 (fórmula de Kutter) às paredes do túnel. Este coeficiente suge­ ria que as paredes eram uma massa escarpada de irregularidades. Mas Carlson, que queria formar sua própria opinião sobre a rugosidade das pare­ des e do teto, decidiu examinar o maior túnel de Big Creek. Aquele túnel tinha a forma idealizada de ferradura, de aproximadamente 21 pés quadra­ dos (1,95 m2), e ia do nível de jusante (tailwater) da Casa de Força No. 8 ao longo do rio San Joaquin por uma distância de cerca de 5,5 milhas (8 km). O túnel consistia em três seções retas, com galerias de acesso (adits) nos pontos de curva. Roy havia sido informado de que, antes da de­ tonação para escavação, uma pequena área era Big Creek, Florence Lake Dam. Foto: Bishop, G. Haven, 30/06/1930 https://hdl.huntington.org/digital/collection/p16003coll2/id/26440/", "24 ■ REVISTA IRC ■ JUNHO DE 2026 perfurada para dinamitar uma região piloto e, em seguida, um anel de furos era perfurado ao redor da periferia. Todos esses furos eram preenchidos com explosivos. Os furos internos eram acionados primeiro, um instante antes da explosão dos furos periféricos. O resultado dessa sequência era que a quebra excessiva (overbreak) era mantida em um mínimo e as paredes apresentavam muitas super­ fícies quase planas. Agora examinando essas pa­ redes pela primeira vez, Roy achava inconcebível que o coeficiente de rugosidade pudesse ser tão alto quanto 0,35. No entanto, o plano para o novo projeto era baseado nesse alto coeficiente. Foi de acordo com este alto valor do coeficiente de rugosidade que o Túnel de Florence Lake foi esca­ vado com uma inclinação de 0,3%, cerca de 16 pés por milha. Como o túnel tinha 13,6 milhas (26 km) de com­ primento, sua captação precisava ser quase 220 pés (67 m) mais alta que a saída no lago Huntington. Isso o colocou na elevação de quase 7200 (em pés, o que dá aproximadamente 2195 m acima do nível do mar). As consequências de um nível de captação tão alto eram aparentes na geografia da região de captação de Florence Lake. Cerca de duas milhas (3,2 km) rio abaixo (jusante) da captação havia um desfiladeiro natural com uma montanha de gra­ nito inclinada de um lado e um enorme dique de granito do outro. O desfiladeiro era o local ideal para uma barragem econômica que poderia for­ necer uma capacidade de armazenamento de 200.000 acres-pés (0,247 km³ ou 247 milhões de m³), mas a barragem que foi realmente construída duas milhas (3,2 km) rio acima — uma barragem longa com 58 arcos — tinha uma capacidade de apenas 60.000 acres-pés (74 milhões de m³), e foi mais cara do que a barragem a jusante teria sido. Qual poderia ser a possível razão para não se utilizar o local ideal a jusante? Exatamente por­ que o coeficiente de rugosidade havia sido supe­ restimado. Se o coeficiente tivesse sido determi­ nado com precisão, uma barragem poderia ter sido construída com uma inclinação menor, mo­ vendo a captação de Florence Lake duas milhas (3,2 km) rio abaixo e transformando o desfiladeiro em um reservatório. O túnel entre Huntington Lake e Florence teria percorrido uma linha reta quatro milhas (6,4 km) mais curta do que o com­ primento do túnel real. A captação estaria próxi­ ma do desfiladeiro e a inclinação do túnel seria de aproximadamente 0,2% em vez de 0,3%. Dizer que o coeficiente de rugosidade de 0,35 era muito alto era uma coisa, mas será que ele con­ seguiria provar isso? Bem abaixo no Rio San Joa­ quin, a uma elevação de cerca de 2.000 pés (610 m), outro túnel estava sendo construído. Carlson por acaso estava posicionado em uma das galerias de acesso desse túnel quando ele se aproximava da conclusão. Por sorte, a empresa decidiu desviar o rio através do túnel para limpá-lo de detritos. De­ vido à inclinação de 0,3 por cento do túnel, todo o Drone captura um raro momento. Foto: David Husted, 26/06/2023: Fonte: https://kmph.com/news/local/drone-captures-rare-sighting-at-florence-lake", "JUNHO DE 2026 ■ REVISTA IRC ■ 25 fluxo do rio não preenchia a seção transversal do túnel, preenchia um pouco mais da metade. Isso deu a Roy a chance de realizar um teste. Carlson pegou alguns blocos de madeira, pin­ tou-os de vermelho, e martelou pregos neles até que flutuassem por pouco. Anotando o horário exato, ele jogou esses blocos na água corrente em uma das galerias. Ele então dirigiu até a saída do túnel e esperou que os blocos emergissem para que pudesse registrar o tempo percorrido. Como já havia medido o “perímetro molhado“ e a área da seção transversal do fluxo de água, Roy tinha dados suficientes para calcular o coeficiente de rugosidade. Descobriu-se ser cerca de 0,20, muito menos que os estimados 0,35. Relembrando o episódio, Roy refletiu sobre as mudanças que ocorreriam se o Projeto Florence Lake fosse construído hoje. Primeiro, o túnel do Lago Florence para Huntington seria realocado. Seguiria uma linha reta a partir de uma captação diferente, próxima ao Dique Jackass, até o topo do Lago Huntington, fazendo com que tivesse 10 mi­ lhas em vez de 14 milhas (16 km em vez de 22 km) de comprimento. O túnel descarregaria no Lago Huntington no nível do reservatório cheio em vez de cinquenta pés (15,2 m) acima dele, e a captação ocorreria a 106 pés em vez de 215 pés (32,3 m em vez de 65,5 m) acima do túnel. Isso proporciona­ ria uma inclinação adequada de 0,2%. Em vez de uma barragem de 58 arcos duas milhas (3,2 km) a montante do desfiladeiro no Dique Jackass, uma barragem do tipo contraforte (buttress-type) me­ nos cara poderia ser construída no desfiladeiro. Baixar a captação e realocar o túnel tornariam, assim, o Dique Jackass um local adequado para a barragem. Um coeficiente de rugosidade menor torna viável este esquema revisado. Embora Roy economizasse a maior parte do seu salário e se saísse bem em seu trabalho, ele buscava mais desafios. Depois de um ano intei­ ro de trabalho, ele pediu demissão e ingressou na Caltech para estudar física, sua primeira pai­ xão. Lá, ele foi inspirado pelo Professor Robert A. Millikan, que tinha acabado de receber o Prêmio Nobel por “pesar o elétron“. Millikan documen­ tou o tamanho do elétron pela primeira vez. Mais tarde, Roy descobriu que sua formação em física havia sido inestimável para ele. A engenharia, ele acreditava, não era nada mais do que uma aplica­ ção da física clássica. Lecionando em Redlands Após estudar na Caltech, Roy passou um ano lecionando em Redlands, onde substituiu o chefe do Departamento de Física e Engenharia enquanto esse professor estava em licença sabática. Descre­ vendo seu ano como professor, Roy lembrou que todos os alunos de seu curso de Geometria Des­ critiva eram homens, com apenas uma excessão. Quando essa turma se reuniu pela primeira vez, a estudante chegou atrasada. Não vendo ninguém que se parecesse com um professor, ela perguntou a Roy: “Onde está o prof?“ Tentando agir de forma respeitável, o jovem instrutor respondeu de um modo elegante: “Sou eu“ (“I am he“). Após essa intro­ dução constrangedora, Roy deu muita assistência à ela durante o curso e ela provou ser uma boa aluna. Durante o ano de Roy em Redlands, seu primo Chester estava no nono ano em San Bernardino, a dez milhas (16 km) de distância. Como o pai de Chester estava incapacitado pela tuberculose, Chester trabalhava em vários empregos para sus­ tentar seus pais. Um desses empregos era criar porquinhos-da-índia para experimentos de la­ boratório. Aos sábados, Roy costumava ir de bici­ cleta até San Bernardino para passar tempo com Chester e ajudá-lo a juntar grama para alimentar os porquinhos-da-índia. Em um de seus sábados juntos, Chester disse a Roy que queria inventar algo para “ficar rico”. Na verdade, Chester estava tão ansioso para ter su­ cesso como inventor que assinou diversas revistas sobre o assunto. Nos anos seguintes, tanto Ches­ ter quanto Roy se tornaram inventores, mas as re­ vistas de Chester não tiveram nada a ver com isso. Retorno à southern California Edison Company Após um ano lecionando na Universidade de Redlands, Roy voltou a trabalhar para a Southern California Edison Company. Desta vez ele foi en­ viado para Florence Lake, onde uma barragem de concreto em arcos múltiplos estava sendo cons­ truída. Entregando a Roy todas as informações disponíveis sobre o concreto como material de construção, seus supervisores o designaram para conduzir a pesquisa que os ajudaria a redigir es­ pecificações para o concreto. Vendo quão pouco se sabia sobre a tecnologia do concreto, Roy ins­ pirou-se a perseguir esse fértil campo de estudo.", "26 ■ REVISTA IRC ■ JUNHO DE 2026 1. Datas de nascimento e morte ▶Data de Nascimento: 23 de setembro de 1900, em Big Stone, Minnesota, Estados Unidos ▶Data de Morte: 21 de novembro de 1990, em Oakland, Califórnia, Estados Unidos (aos 90 anos) 2. Principais contribuições técnicas Instrumentação para Concreto ▶Inventor pioneiro de instrumentos para medi­ ção interna em estruturas de concreto ▶Desenvolveu medidores de tensão, deforma­ ção, temperatura e pressão Patentes registradas: ▶Carlson Strain Meter ................................. #2,036,458 ▶Electric Pressure Meters ......................... #2,059,549 ▶Stress Meters ................................................... #2,148,013 ▶Stress meter for soils and granular materials ....................................... #3,529,468 ▶Milhares de seus instrumentos foram incor­ porados em grandes barragens dos EUA, Brasil e outros países Tecnologia de Concreto Massa ▶Especialista reconhecido mundialmente em concreto massa para grandes barragens ▶Desenvolvimento de cimentos de baixo calor para construção de barragens ▶Criação de modelos matemáticos para com­ portamento do concreto ▶Membro ativo do Comitê sobre Performance de Longo Prazo do Cimento Portland Pesquisa e Desenvolvimento ▶56 artigos técnicos publicados em sociedades profissionais ▶Temas: instrumentação, análise estrutural, segurança de barragens, tecnologia do concreto, química do cimento 3. Relação com Projetos Hidrelétricos no Brasil Envolvimento de Duas Décadas ▶20 anos de envolvimento com projetos de bar­ ragens no Brasil ▶Contribuições fundamentais para o desenvol­ vimento hidrelétrico brasileiro Projeto Itaipu ▶Papel crucial na resolução de problemas com­ plexos com construção de concreto Portland na barragem de Itaipu ▶Aplicação de sua expertise em instrumenta­ ção e tecnologia de concreto massa Roy W. Carlson informações biográficas corretas HOMENAGENS", "JUNHO DE 2026 ■ REVISTA IRC ■ 27 NATIONAL ACADEMY OF ENGINEERING, MEMORIAL TRIBUTES: VOLUME 5 (1992)", "28 ■ REVISTA IRC ■ JUNHO DE 2026 Formação de Engenheiros Brasileiros ▶Encorajou uma geração de engenheiros bra­ sileiros a estudar tecnologia do concreto na UC Berkeley ▶Contribuiu para o desenvolvimento de capaci­ dade técnica local no Brasil Reconhecimento Oficial ▶Ordem do Cruzeiro do Sul (1984) - mais alta honraria do Brasil para um estrangeiro ▶Reconhecimento por suas contribuições aos grandes desenvolvimentos hidrelétricos do país 4. Informações biográficas essenciais Formação Acadêmica ▶1922: A.B. em Matemática - University of Re­ dlands, Califórnia ▶1923-1924: Estudos em Física - California Insti­ tute of Technology ▶1925: M.S. em Engenharia Civil - University of California, Berkeley ▶1939: Sc.D. em Materiais - Massachusetts Insti­ tute of Technology (MIT) ▶1951: Doutor Honoris Causa em Ciências - Uni­ versity of Redlands Carreira Profissional ▶1925: Início da carreira como inspetor de con­ creto na Southern California Edison Company ▶1925-1926: Inspetor na construção da Steven­ son Creek Test Dam ▶1927-1931: Engenheiro de testes para 10 bar­ ragens do Los Angeles County Flood Control District ▶1931-1934: Diretor assistente de Pesquisa em Materiais para a construção da Represa Hoover ▶1931-1990: Afiliação de 60 anos com a Universi­ ty of California, Berkeley ▶1943-1945: Trabalho no Projeto Manhattan (Los Alamos e UC Berkeley) Principais Honrarias e Prêmios ▶1967: Membro honorário do American Concrete Institute ▶1972: Outstanding Civilian Service Award - U.S. Army Corps of Engineers ▶1974: Eleito para a National Academy of Engine­ ering ▶1980: Berkeley Citation - University of California ▶1984: Ordem do Cruzeiro do Sul - Governo do Brasil ▶1986: Distinguished Engineering Alumnus Award - UC Berkeley ▶Dudley Medal - American Society for Testing Ma­ terials ▶Wason Medal e Turner Medal - American Concrete Institute ▶Fellow - American Society of Civil Engineers Família ▶Esposa: Eleanor Cutler (casamento em 14 de setem­ bro de 1927) ▶Filhas: Susan C. Ichinaga (Morgan Hill, CA) e Sally C. Brasseur (Penn Grove, CA) Legado Acadêmico ▶1985: Estabelecimento da “Roy W. Carlson Chair of Engineering” na UC Berkeley Doador de várias instalações auxiliares do Departa­ mento de Engenharia da UC Berkeley Fontes Consultadas ▶National Academy of Engineering Memorial Tribute: https://www.nae.edu/188828/ROY-W­ -CARLSON-19001990 ▶National Academies Press - Memorial Tributes Vo­ lume 5: https://nap.nationalacademies.org/read/1966/ chapter/10 ▶UC Berkeley Engineering: https://people.eecs. berkeley.edu/~newton/roy_w_carlson.htm ▶Atomic Heritage Foundation: https://ahf.nuclear­ museum.org/ahf/profile/roy-w-carlson/ Nota: Estas informações foram compiladas a partir de fontes oficiais e confiáveis para garantir a precisão dos dados biográficos de Roy W. Carlson, especialmente para correção da data de falecimento na página institucional.", "JUNHO DE 2026 ■ REVISTA IRC ■ 29 TIME LINE O Dr. Roy W. Carlson foi uma figura central e ino­ vadora na engenharia de barragens e tecnologia do concreto, cuja carreira abrangeu seis décadas. A sua importância reside na introdução de métodos e instrumentos que permitiram uma compreen­ são e um controlo sem precedentes do comporta­ mento do concreto massa em grandes estruturas. Aqui está uma linha do tempo destacando a vida e as principais contribuições do Dr. Roy W. Carlson: 1925: ▶Início de Carreira: Começa a trabalhar para a Southern California Edison Company, onde contribuiu para determinar a segurança de 37 barragens. ▶Pioneirismo em Medição de Temperatura In­ terna: Mediu as temperaturas internas na Bar­ ragem Experimental de Stevenson Creek, um projeto onde as fissuras observadas indicaram a existência de tensões de tração pré-existentes no concreto. O “telemetro elétrico” de discos de car­ bono foi usado para medir deformações internas nesta barragem, embora sofresse de instabilida­ de a longo prazo e sensibilidade à umidade. 1926-1930: ▶Início da Pesquisa em Instrumentação: Seu interesse em medição de deformação e tensão começou durante os testes na Barragem Experi­ mental de Stevenson Creek. ▶Desenvolvimento de Novos Princípios para Sensores: Em 1927, dados sobre a resistência elétri­ ca de fios de aço carbono chamaram sua atenção, levando à ideia de usar a mudança de comprimen­ to e de tensão para medir a resistência elétrica. ▶Conceituação do Medidor de Tensão (Stress Meter): Propôs a ideia de um dispositivo que me­ diria apenas a tensão, imune a deformações não diretamente relacionadas à tensão. Embora ini­ cialmente contestado, o princípio foi mais tarde reconhecido como sólido. 1930s: ▶Invenção do Medidor de Deformação Carlson (Strain Meter): Desenvolveu um medidor de de­ formação resistivo incorporável, utilizando fios de aço-carbono não ligados. Este sensor era preenchi­ do com óleo para evitar a penetração de umidade, conferindo-lhe uma excelente estabilidade a lon­ go prazo e a capacidade de servir como medidor de deformação e termômetro simultaneamente, sem a necessidade de compensação térmica adicional. ▶Estudos para a Barragem Hoover: Juntou-se a pesquisadores do Laboratório de Engenharia de Materiais de Berkeley para estudar mate­ riais para a construção da Barragem Hoover. Foi nesse contexto que o problema do aquecimen­ to interno do concreto foi abordado como uma questão principal, levando ao desenvolvimento de cimentos de baixo calor. ▶Aplicação em Campo e Resolução de Problemas: Utilizou seus termômetros para investigar as fissu­ ras na Barragem de Ambuersen, no México. Suas medições e cálculos de tensões de tração, superio­ res a 300 psi, convenceram as autoridades de que as fissuras eram causadas pelo aquecimento inter­ no do concreto, absolvendo o cimento de culpa. 1931: ▶Iniciou sua longa afiliação de 60 anos com a UC Berkeley, vindo para a instituição para estudar materiais para a Barragem Hoover. ▶Obteve seu mestrado em engenharia civil em Berkeley. 1939: ▶Concluiu seu doutorado em materiais no MIT (Massachusetts Institute of Technology), com a tese intitulada “Desenvolvimento e Análise de um Dispositivo para Medir Tensão Compressiva em Concreto”. Ao longo de duas décadas (período sem data específica, mas notável): ▶Projetos de Barragens no Brasil: Teve um envolvimento de vinte anos em projetos de barragens no Brasil, sendo condecorado com a Ordem do Cruzeiro do Sul, a mais alta honra­ ria do país. Também incentivou uma geração de engenheiros brasileiros a estudar tecnologia do concreto em Berkeley.", "30 ■ REVISTA IRC ■ JUNHO DE 2026 Contribuições para modelagem e resfriamento do concreto: ▶Método de Carlson para Cálculo de Tempe­ ratura: Desenvolveu um método de integra­ ção passo a passo para calcular a temperatura em concreto massa, especialmente adaptável a paredes espessas e áreas próximas à funda­ ção rochosa. Este método requer conhecimen­ to de distribuições iniciais de temperatura, difusividade e aumento de temperatura adia­ bática, e pode ser modificado para considerar o fluxo de calor entre diferentes materiais. ▶Teoria de Resfriamento por Tubos Embuti­ dos: A teoria para a remoção de calor do con­ creto por tubos de resfriamento embutidos foi inicialmente desenvolvida para os estudos de resfriamento da Barragem Hoover. Este método provou ser uma forma prática de con­ trolar as temperaturas do concreto e permitir o rejuntamento das juntas de contração. ▶Modelagem Numérica (FEM): O Dr. Roy Carlson foi fundamental ao recomendar e in­ fluenciar o uso da análise de elementos finitos (FEM) para problemas complexos como a fis­ suração induzida por temperatura na Barra­ gem de Norfork. Sua recomendação foi decisi­ va para que a proposta de análise de elementos finitos da Berkeley fosse aceita pelo Corpo de Engenheiros, em detrimento de uma proposta baseada em computadores analógicos. ▶Estudos sobre Propriedades do Concreto: Realizou pesquisas que incluíam o estudo da variabilidade do módulo de elasticidade (E) no concreto, o que afeta a precisão da determina­ ção teórica da tensão a partir da deformação. ▶1974: Foi eleito para a Academia Nacional de Engenharia. ▶1977: Recebeu a afiliação honorária do Ameri­ can Concrete Institute (ACI). ▶1980: Recebeu o Berkeley Citation, a mais alta honra por suas contribuições ao campo e à Uni­ versidade. ▶1982 (29 de Janeiro): Proferiu uma palestra na University of California, Berkeley, sobre o desen­ volvimento de seus instrumentos para medição de deformação e tensão em concreto. ▶1986: Recebeu o Distinguished Engineering Alumnus Award. ▶1990: Faleceu aos 90 anos, deixando um lega­ do duradouro no campo da tecnologia do con­ creto e da segurança de barragens. Seu trabalho é descrito como “pioneiro” e “seminal”.", "JUNHO DE 2026 ■ REVISTA IRC ■ 31 FOTO: MARIORDO (MARIO ROBERTO DURÁN ORTIZ), 2017.", "32 ■ REVISTA IRC ■ JUNHO DE 2026 Este artigo foi estruturado para atender aos critérios de uma publicação técnico- científica, mantendo o tom biográfico e a proximidade com a comunidade de “barrageiros” que acompanhou a trajetória de Walton Pacelli de Andrade. Walton Pacelli de Andrade: uma vida moldada em concreto e paixão pelas barragens Por: redação técnica Fonte: entrevista ao Museu da Pessoa (Walton Pacelli de Andrade, 14/06/2021) Introdução: o homem e o território A trajetória de Walton Pacelli de Andrade não pode ser dissociada da terra e da disciplina. Nascido na zona rural de Vieiras, Minas Gerais, na Fazenda da Vargem, Pacelli cresceu em uma família numerosa de 20 irmãos. Criado sob a égide de um pai que começou como tropeiro e se tornou um fazendeiro de grande expressão, Amaro Acelino de Andrade, Pacelli apren­ deu cedo o valor do trabalho e da convivência harmô­ nica. Essa base rural, onde a liberdade e o respeito pe­ los colaboradores da fazenda eram a norma, moldou o caráter do engenheiro que, anos depois, lideraria equipes em canteiros de obras por todo o globo. A fundação acadêmica e a semente da engenharia A transição do campo para a academia ocorreu de forma gradual, passando por Miradouro, Muriaé e, finalmente, Juiz de Fora. Foi no Colégio Pio XI, em HOMENAGENS ACERVO PESSOAL DE FLÁVIO MAMEDE, 2015", "JUNHO DE 2026 ■ REVISTA IRC ■ 33 Manhumirim, durante uma palestra vocacional, que a “semente” da engenharia foi plantada em sua mente. Pacelli, que já demonstrava afinidade com as ciências exatas, decidiu sua profissão ainda no ginásio e nunca vacilou em sua escolha. Em 1958, ingressou na Escola de Engenharia de Juiz de Fora, uma instituição que, na época, contava com um ambiente de profunda cama­ radagem e turmas reduzidas. Durante o curso, Pacelli serviu ao Exército no Estabelecimento Regional de Finanças. Esse período militar foi fundamental para sua formação como gestor, ensinando-lhe a importância da hierarquia e da harmonia entre subordinados e chefias — lições que seriam aplicadas em cada laboratório de Fur­ nas que viria a coordenar. O batismo em Funil: o desafio de ser autodidata A carreira profissional de Pacelli começou em 1964, na Companhia Hidrelétrica do Vale do Paraí­ ba (Chevap), na construção da Barragem do Funil. Por uma casualidade do destino, entre uma vaga em hidrologia e outra no laboratório de concreto, Pacelli escolheu o concreto. A Barragem do Funil, um projeto do enge­ nheiro português Laginha Serafim, é um marco da engenharia brasileira: uma estrutura de dupla curvatura, com 85 metros de altura. Diante da sa­ ída precoce de seu mentor no laboratório, Pacelli, recém-formado, tornou-se o responsável pela área de tecnologia. Sem uma formação específica pré­ via em tecnologia do concreto, ele se tornou um autodidata voraz, estudando manuais em francês e espanhol comprados em livrarias de São Paulo. A era Furnas e a consolidação dos laboratórios Em 1967, a Furnas assumiu as obras de Funil e ab­ sorveu Pacelli em seus quadros. Começava ali uma relação de quase 40 anos de dedicação. Pacelli se­ guiu para a Usina de Marimbondo e, posteriormen­ te, para Itumbiara, sempre levando consigo a exper­ tise de montar e expandir laboratórios de campo. Para Pacelli, o laboratório não era um escritó­ rio frio, mas sim um anexo vibrante do canteiro de obras. Ele recorda que o regime de fiscalização de Furnas era “ombro a ombro” com o empreitei­ ro, com os engenheiros passando a maior parte do tempo dentro da obra. O Laboratório Central de Goiânia: referência mundial Um dos maiores legados de Pacelli foi a criação do laboratório central de Furnas em Goiânia, fundado em 1986. O que começou como uma necessidade de centralizar equipamentos de grandes obras como Itumbiara, tornou-se um dos maiores centros de tecnologia de engenharia civil do mundo na época. ▶O laboratório abrangia áreas de mecânica dos solos, mecânica das rochas, metrologia e acom­ panhamento de construção civil. INOVAÇÃO TÉCNICA EM FUNIL Em Funil, Pacelli enfrentou desafios técnicos rigorosos: ▶A instrumentação da barragem foi pioneira no Brasil, com equipamentos que o próprio Pacelli instalou após estágios em Portugal e Madri. ▶O controle de temperatura do “concreto massa” era crítico; a especificação exigia o uso de água gelada para garantir que a reação exotérmica de hidratação não ultrapassasse os 45°C. ▶O uso de agregados de grande dimensão (brita com até 150 mm) exigia uma fiscalização efetiva e um rigoroso controle de qualidade.", "34 ■ REVISTA IRC ■ JUNHO DE 2026 ▶Foi nesse centro que Furnas se notabilizou no desenvolvimento da tecnologia de Concreto Com­ pactado com Rolo (CCR). ▶O laboratório serviu como base para inúme­ ras dissertações e teses de mestrado e doutora­ do, além de treinar estagiários e engenheiros que hoje ocupam posições de destaque no se­ tor elétrico. Apesar de não possuir o título aca­ dêmico de doutor, seu valor intelectual ultra­ passa esses limites, lapidando profissionais e criando uma escola de formação na prática la­ boratorial e de engenharia aplicada em obras. Inovações e a “cafeteira do Pacelli” O espírito inventivo de Pacelli e sua equipe gerou frutos que ainda hoje são usados na indústria. Um dos exemplos mais marcantes é o DMA (Determi­ nação da Densidade, Massa Específica e Água). ▶Desenvolvido para controlar a densidade e o teor de água do CCR, o equipamento foi apelida­ do carinhosamente pelos colegas de “Cafeteira do Pacelli”. ▶Outra inovação foi a tecnologia de concreta­ gem submersa, desenvolvida para simular pres­ sões de até 90 metros de profundidade ou mais, atendendo a demandas complexas como as da usina de Guri, na Venezuela. ▶Pacelli também destaca a criação de uma “espingarda” de ar comprimido para projeção de argamassa em reparos de concreto, inven­ tada por um mecânico de Furnas apelidado de “Lasquinha”. Além das fronteiras: a engenharia como diplomacia A competência técnica de Pacelli levou o nome de Furnas e da engenharia brasileira para o exterior. Ele atuou como consultor em países como Iraque, China, Venezuela, Colômbia, Uruguai e Angola. Na China, participou de simpósios durante o início da construção de Três Gargantas, observan­ do como os chineses absorveram a tecnologia bra­ sileira de barragens para se tornarem os maiores construtores do mundo. Em Angola, deu suporte à infraestrutura da Barragem de Capanda, levando membros de sua equipe de Goiânia para garantir a qualidade tecnológica da obra. Causos e memórias: o lado humano do canteiro Para os amigos barrageiros, Pacelli não poupa his­ tórias que humanizam a vida dura das obras. Ele recorda com carinho de figuras como Everton Ma­ ciel, o “Tatu”, um encarregado de liderança impres­ sionante e vida pessoal agitada (pai de 17 filhos). Pacelli relata, entre risos, a famosa “pincelada” do Tatu, uma das muitas passagens pitorescas que ali­ viavam a tensão do trabalho pesado em Itumbiara. Ele também se orgulha de ter alfabetizado o operá­ rio Carlito, que começou como servente em Funil, aprendeu a ler e escrever através de métodos que Pacelli adaptou (misturando Paulo Freire e livros infantis), e acabou se aposentando em Furnas como encarregado de central de concreto. O salto tecnológico: do concreto vibrado ao CCR Um dos marcos mais significativos da carreira de Pacelli foi a sua contribuição para a consolidação do Concreto Compactado com Rolo (CCR) no Bra­ sil. Diferente do concreto convencional vibrado (CCV), o CCR possui uma consistência seca (aspec­ to de “terra úmida”) e é aplicado com equipamen­ tos de terraplenagem, como tratores de esteira e rolos compactadores. A inovação do DMA (“a cafeteira do Pacelli”) A transição para o CCR trouxe um desafio crítico: como controlar a densidade e o teor de água do material em estado fresco de forma ágil no cantei­ ro? Em uma colaboração com os técnicos Guilher­ me Leroy e Valdico Paulino de Oliveira, e com a participação de seu filho, Moacir Alexandre Souza de Andrade, Pacelli liderou o desenvolvimento de um dispositivo inovador:", "JUNHO DE 2026 ■ REVISTA IRC ■ 35 Angola e o desafio da RAA em Capanda Na construção da Barragem de Capanda, Pa­ celli atuou como consultor para o governo an­ golano (GAMEK). O grande desafio técnico foi o controle da Reação Álcali-Agregado (RAA). ▶Solução Estratégica: Junto a engenheiros como o russo Osipov, Pacelli discutiu o uso de finos das areias britadas (passantes na pe­ neira nº 100) para inibir a expansão do con­ creto, uma técnica que se tornou referência para obras em ambientes tropicais. China: o intercâmbio em Três Gargantas Pacelli visitou a China diversas vezes, inclu­ sive durante o simpósio de lançamento de Três Gargantas. ▶Ele observou de perto como os chineses enviaram 155 missões a Itaipu para absorver a tecnologia brasileira, utilizando posterior­ mente cinzas volantes para criar pastas de alta fluidez em seus próprios projetos. Venezuela e a engenharia submersa em Guri Para a usina de Guri, Pacelli e sua equipe em Goiânia desenvolveram um equipamento pio­ neiro para simular a concretagem submersa a 90 metros de profundidade. ▶A “curiosidade de barragem” de Pacelli uniu-se à sabedoria prática: ao ouvir de en­ genheiros locais que “rio com muito peixe é bom para concreto” (devido à alcalinidade), ele integrou essas observações biológicas aos estudos químicos de durabilidade das toma­ das d’água venezuelanas. ▶O Equipamento: Batizado oficialmente de DMA (Determinação da Densidade e Massa es­ pecífica e a Água), o dispositivo permitia medir o volume de concreto através do deslocamento de água (Lei de Arquimedes). ▶O Apelido: Pelo formato peculiar, o meio técni­ co logo o apelidou de “Cafeteira do Pacelli”, uma ferramenta que se tornou norma brasileira e peça fundamental para garantir a homogeneidade das camadas de CCR em barragens como as de Serra da Mesa e Cana Brava. Pacelli defendeu a evolução técnica do CCR através de estudos sobre “Alta Pasta” e o uso adequado de fi­ nos de britagem para garantir a impermeabilidade e a resistência das estruturas, competindo direta­ mente com as barragens de enrocamento devido à agilidade construtiva e redução de custos. O laboratório de Goiânia: um epicentro de inteligência civil O que hoje conhecemos como o Centro de Tecno­ logia em Engenharia Civil de FURNAS (DST/GST), em Aparecida de Goiânia, teve em Pacelli um de seus grandes arquitetos e incentivadores. Inaugura­ do em sua forma centralizada em 1986, o laboratório nasceu da necessidade de gerir o vasto parque de equipamentos vindo de Itumbiara e Marimbondo. ▶ FOTO: CORPOELETRIC FOTO: HOLANDA CAVALCANTI, 2002", "36 ■ REVISTA IRC ■ JUNHO DE 2026 Excelência e certificação internacional Sob a influência de Pacelli e sua equipe, o centro não era apenas uma sala de ensaios, mas um polo de P&D (Pesquisa e Desenvolvimento): ▶Acreditação e qualidade: O laboratório con­ quistou a acreditação junto ao Inmetro em 1994 e a certificação ISO 9001 em 1996, tornando-se re­ ferência mundial para o setor elétrico. ▶Infraestrutura de Ponta: O complexo abriga laboratórios de mecânica dos solos, mecânica das rochas (com prensas de última geração para ensaios triaxiais), meteorologia e até um La­ boratório de Aerodinâmica Aplicada, que hoje subsidia pesquisas de energia eólica e análise de comportamento de pás e torres. ▶O Prêmio da Qualidade: O auge deste com­ promisso foi a conquista da Medalha de Ouro do Prêmio da Qualidade do Governo Federal (cerca de 2001/2002), entregue pessoalmente pelo ex-presidente Fernando Henrique Cardoso, um reconhecimento à sistematização de processos iniciada nas obras de Angra 1. Fronteiras rompidas: a engenharia brasileira no mundo A expertise de Pacelli no controle tecnológico do concreto transformou-o em um “diplomata técni­ co”. Suas missões internacionais levaram a tecno­ logia de Furnas para cenários complexos: Conclusão: o legado dos “piões de obra” Para os seus amigos barrageiros, Pacelli deixa um ensinamento que vai além das fórmulas: o respeito ao saber prático. Ele frequentemente atribui o sucesso de invenções como a pistola de argamassa projetada à observação astuta de mecânicos como o “Lasquinha” ou encarrega­ dos como o “Tatu”. Walton Pacelli de Andrade aposentou-se de Furnas, mas sua marca permanece gravada no concreto de cada vertedouro recuperado e em cada jovem engenheiro treinado em Goiâ­ nia. Como ele mesmo resume: “A gente sai da fazenda, mas a fazenda — e a obra — não sai da gente”. Walton Pacelli de Andrade se aposentou de Furnas em 2003, mas, como ele mesmo diz, “Furnas não sai da gente”. Sob sua gestão, Fur­ nas recebeu a Medalha de Ouro do Prêmio da Qualidade do Governo Federal em 2002, um reconhecimento à excelência dos registros e procedimentos laboratoriais exigidos, inclusi­ ve, pelo setor nuclear em Angra 1. Mesmo aposentado, Pacelli permanece ativo como consultor, viajando para inspecionar e re­ cuperar estruturas de concreto de norte a sul do país e no exterior. Sua vida é um testemunho da “memória das coisas bem-feitas” — um compro­ misso inabalável com a ética, a técnica e, acima de tudo, com as pessoas que moldam o futuro do Brasil através da engenharia de barragens. ■ FOTO: ELCIO ANTONIO GUERRA, 1997.", "JUNHO DE 2026 ■ REVISTA IRC ■ 37 ACERVO CBDB, 2020. IMAGEM TRABALHADA POR IA", "", "", "40 ■ REVISTA IRC ■ JUNHO DE 2026 DOSSIÊ _____________________________ 1 fmpgomes@eletrobras.com, Brazil CONTRIBUTIONS TO THE ANALYSIS OF THE EXOTHERMIC- MECHANICAL PHENOMENON IN MASS CONCRETE Flávio Mamede P. Gomes1 ELETROBRAS ABSTRACT This paper aims to report on the advancements achieved by ELETROBRAS-FURNAS over the past 15 years in the field of mass concrete, encompassing laboratory tests, case studies of emblematic projects, and computational modeling developed within three R&D projects and during an incomplete Ph.D. at the University of Brasília (UnB). The tests conducted by ELETROBRÁS-FURNAS, now discontinued due to the shift away from large- scale dam construction in Brazil, were part of a modernization and automation project worth reporting. Among the emblematic projects are the thermal analyses for the Santo Antônio Hydroelectric Plant (UHE Santo Antônio), which was the largest engineering project in Brazil at the time. Equally interesting and important were the thermal studies for the São Manoel Hydroelectric Plant (UHE São Manoel), Apiacás Hydroelectric Complex (CHE Apiacás), to name just the most recent ones. In computational modeling, the state-of-the-art was achieved in thermo-chemical coupling, whether through adiabatic or isothermal formulation. The isothermal-adiabatic interconversion was introduced to support either formulation with any available calorimetric tests, whether isothermal, semi-adiabatic (Langavant), or adiabatic. Two finite element software programs (ANSYS and MULTIMECH) were customized with a viscoelastic aging model based directly on the concrete creep function, which was used to perform the mechanical analyses of these projects. Finally, generalized analytical solutions were developed for the temperature field in typical situations such as infinite slabs/retaining walls, slabs on foundations, cylinders (test specimens and large diameter caissons), and cylinders with holes (post-cooling), considering a generic internal heat generation. Keywords: mass concrete, viscoelasticity, aging, heat generation, calorimetry, modeling, finite elements, dams, creep.", "JUNHO DE 2026 ■ REVISTA IRC ■ 41 Fifth International Dam World Conference Portugal • Lisbon • LNEC • April 13-17, 2025 1. INTRODUCTION The objective of this work is to report the developments achieved by Furnas in various research projects and services, encompassing laboratory testing, modeling, and monitoring of dam structures. The computational simulation behavior of mass concrete at the early-ages and the evaluation of cracking risk, particularly stress field analysis, are extremely challenging tasks. Two R&D projects (from 2012 to 2017) — one focused on modeling and optimizing mass concrete with the Federal University of Ceará (UFC), coordinated by Prof. Jorge Soares, and another about fiber-reinforced concrete, involving modeling, experimentation, and rheology with the University of São Paulo (USP), coordinated by Prof. Túlio Bittencourt — provided the context for the developments presented here. Subsequently, between 2014 and 2018, during a doctoral research project at the University of Brasília (UnB) under the supervision of Prof. Lineu José Pedroso, analytical-numerical validations of the exothermic phenomenon in concrete were achieved, enabling new insights into the problem, which will also be discussed later. From the theoretical formulation of the thermal and mechanical problem to the finite element formulation and computational modeling of layered construction phasing, we believe we have achieved significant progress toward the state of the art. We explored two distinct but related formulations: the adiabatic and the isothermal formulations. The isothermal-adiabatic interconversion (and vice versa) was introduced to allow both formulations to be fed with experimental data from any calorimeter available, whether isothermal, semi-adiabatic (Langavant), or adiabatic. Two finite element programs (ANSYS and MULTIMECH) were customized with a viscoelastic aging model based directly on the creep function of concrete. Among the landmark projects where the knowledge and tools developed in the R&D projects were applied, notable examples include the thermal and mechanical analyses for the Santo Antônio Hydroelectric Power Plant (UHE Santo Antônio), the largest engineering project in Brazil at the time. Equally interesting and important were the thermal studies for the São Manoel Hydroelectric Power Plant (UHE São Manoel), the Apiacás Hydroelectric Complex (CHE Apiacás), the Santa Cruz Thermoelectric Plant (UTE Santa Cruz), and the Fortim Wind Farm (EOL Fortim), to name just the most recent ones. Experimental testing was conducted by ELETROBRÁS-FURNAS at the Goiânia Concrete Laboratory, which has been recognized for over 40 years for its excellence in civil engineering dedicated to dam construction. These efforts involved the development of numerous safety and automation improvements. Unfortunately, this activity has been discontinued due to the abandonment of large dam construction projects in Brazil.", "42 ■ REVISTA IRC ■ JUNHO DE 2026 Fifth International Dam World Conference Portugal • Lisbon • LNEC • April 13-17, 2025 2. FORMULATION 2.1. Thermal and Thermochemical Part The internal heat generation rate is the source term (ℚ, [W/m³]) of the governing differential equation for the energy balance, which, for practical purposes, is presented here along with the constitutive equation for heat conduction (Fourierʼs Law), specified for isotropic materials: = ∇+ ℚ (1) where,  is the mass density of the material,  is the specific heat capacity,  is the thermal conductivity and  is the temperature of the material, which varies spatially and temporally. The source term can be expressed per kilogram of equivalent cement, = ℚ/, or in terms of the degree of hydration, = /, where  is the total heat per kilogram of equivalent cement. The degree of hydration  can be defined as a measure of the progress of hydration, being the rate of the degree of hydration like a function of both  itself and the temperature . = ∙ (2) The rate of the degree of hydration can also be described as:  =  ∙   (3) where, by comparison:,  ⁄ =  and  ⁄ = . 2.2. Isothermal Formulation In an isothermal process, where =  and  ⁄ = 1, it can be deduced that: = exp   −   (4) where  is known as the Thermal Activity (given in Kelvin), commonly also referred to as  ⁄ , the Activation Energy divided by the universal gas constant 1. 1 Note: The activation energy () has been described, interpreted, and calculated in various ways ([3], [4], [5], [6], [7]). It has been reported that different properties may have different  values for a given concrete, different concretes may have different  values for a given temperature, and different stages of development of a given property may exhibit different  values. Without delving into further details, we consider it appropriate to assume that  remains constant, invariant across different temperatures, properties, and stages of hydration development. In a multicomponent model, where the internal heat generation can be experimentally determined or “deconvoluted” through tests at different reference temperatures, it is possible to consider and calculate  for each reaction to represent the influence of temperature on the internal heat generation of various reactions occurring simultaneously. From an engineering standpoint, using a single , said “apparent”, provides sufficient accuracy to predict the temperature field in mass concrete. Furthermore, we propose abandoning the universal gas constant, which is gratuitously adopted from another context, and instead referring only to Thermal Activity (). This approach acknowledges that the physical interpretation of activation energy is incompatible with the spontaneous nature of the exothermic hydration reactions.", "JUNHO DE 2026 ■ REVISTA IRC ■ 43 2.3. Adiabatic Formulation In an adiabatic process, the only difference is that represents the “adiabatic temperature rise curve of the process starting from an initial reference temperature”: = exp   −  ,∙∆ (5) where ∆∞  it represents the final adiabatic temperature rise, obta alidation involves the cooling of an infinite slab with imposed temperatures on both faces, considering internal heat generation. This heat raises the slab's temperature to a maximum value before cooling begins. The maximum temperature reached is directly proportional to the maximum tensile stress. For this reason, the maximum temperature is the general guideline for specifying dam structures. To control the maximum temperature reached, it is important to study the influential factors in this case, which, although idealized, closely corresponds to typical situations such as spillway piers, intake towers, and retaining walls. This is especially true when constructed with sliding formwork, a high-speed construction process that makes heat loss through the top surface of the layer negligible, rendering the proposed idealization equivalent to real-world conditions. In addition to analyzing the influential factors, the analytical formulation of the infinite slab problem applied to dam pier cases allows for back-analysis using monitoring data. This can help identify deviations from predictions or confirm and determine internal heat generation. Finally, it is possible to consider the activation energy and its influence when varying the placement temperature, the significance of the structure's internal heat generation relative to laboratory test results, and whether the consideration of thermal activation is a first-order or second-order effect. ,   + 4 ∑       − +             (16) This equation provides the temperature as a function of position and time for an infinite slab of height , subject to an imposed surface temperature  and a known initial temperature .", "JUNHO DE 2026 ■ REVISTA IRC ■ 47 The internal heat generation is explicitly and directly included in the generic function . The implementation of this solution must ensure that the integral of  is numerically solved along with the exponential ling) to analyze dams with asphalt concrete cores or new materials such as fiber-reinforced concrete (steel, glass, and/or carbon) or sustainable concrete with low carbon and cement content; c) Modeling dam structures subject to dynamic loads, such as structural components housing hydroelectric turbines; d) Structural analysis and optimization of wind turbine towers, including multiscale modeling of composite-reinforced components. From an academic perspective, the significance of each application discussed here may be debatable. While each case study is unique and unrepeatable, the theoretical thermal and mechanical framework has been developed by various authors over decades. The aging viscoelastic model has been well established since the 1970s. What has been proposed and implemented here is neither the state of the art in mechanics nor in finite element techniques. There are no large deformations, discontinuities, continuous-discontinuous transitions, multiscale approaches, nonlinearity, fracture mechanics, or anisotropy. Even though I worked with researchers at the forefront of various fields—Flávio Souza, David Allen, Jorge Soares, Miguel Azenha, Túlio Bittencourt, Oswaldo Manzoli, Antônio Figueiredo, Rafael Pileggi, Eduardo Fairbairn, Romildo Toledo, among others—the objective was to report what was achieved. There are many more applications and developments than those presented in this work, like UTE Santa Cruz, EOL Fortim and some tal buildings foundations. We tried to push as far as possible within the limitations and toward what I believed could be effectively utilized.", "64 ■ REVISTA IRC ■ JUNHO DE 2026 REFERENCES [1] Wu, S. et al. Estimation of cracking risk of concrete at early age based on thermal stress analysis. Journal of Thermal Analysis and Calorimetry. 2011; v. 105, n. 1, p.171-186. [2] Zocher M.A., Groves S.E., Allen D.H. A three-dimensional finite element formulation for thermoviscoelastic orthotropic media. International Journal for Numerica
