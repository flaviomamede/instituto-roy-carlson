<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<!-- "Adicionar à Tela de Início": abre como app, em tela cheia, sem as barras do Safari
     (no iPhone não há outra forma de esconder a barra de endereços/abas numa aba normal). -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Revista IRC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#13161c">
<title>Revista Concreto — Instituto Roy Carlson</title>
<style>
  :root{
    --bg:#171a1f; --bg2:#0f1115;
    --glass:rgba(22,25,30,.62); --glass-2:rgba(18,21,26,.9);
    --stroke:rgba(255,255,255,.13);
    --ink:#e9ecef; --ink-dim:#aab1ba;
    --accent:#c79a3e; --accent-ink:#1a1407;
    --shadow:0 10px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  #reader{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;
    background:radial-gradient(125% 95% at 50% 0%, #1e222a 0%, var(--bg) 46%, var(--bg2) 100%)}
  #viewport{position:absolute;inset:0;overflow:hidden;touch-action:none}
  #stage{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform;
    transform:translate3d(0,0,0) scale(1);backface-visibility:hidden}
  #book{width:100%;height:100%}
  #book .page{background:#fff;overflow:hidden}
  #book .page img{display:block;width:100%;height:100%;object-fit:contain;
    -webkit-user-drag:none;user-select:none;pointer-events:none}

  /* ---- e-mail gate page ---- */
  .page-gate{background:linear-gradient(180deg,#fbfaf6 0%,#f0eadc 100%);color:#23262b;
    display:flex;align-items:center;justify-content:center;padding:7% 6%}
  .gate-inner{max-width:340px;text-align:center}
  .gate-lock{width:56px;height:56px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;
    background:#fff;border:1px solid #e7dec8;box-shadow:0 8px 22px rgba(0,0,0,.08)}
  .gate-lock svg{width:24px;height:24px;color:var(--accent)}
  .page-gate h2{font-size:23px;line-height:1.16;margin:0 0 8px;font-weight:750;letter-spacing:-.015em}
  .page-gate p.lede{font-size:14px;line-height:1.5;color:#5c6066;margin:0 0 18px}
  .gate-form{display:flex;flex-direction:column;gap:10px;text-align:left}
  .gate-form input{height:44px;border-radius:11px;border:1px solid #d8cfbb;background:#fff;padding:0 14px;
    font-size:15px;color:#23262b;outline:none;width:100%}
  .gate-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,154,62,.22)}
  #leadBtn{height:46px;border:0;border-radius:11px;background:var(--accent);color:var(--accent-ink);
    font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.01em}
  #leadBtn:hover{filter:brightness(1.05)}
  #leadBtn:disabled{opacity:.6;cursor:default}
  .gate-msg{min-height:18px;font-size:13px;color:#9a6a14;text-align:center;margin-top:2px}
  .gate-fine{font-size:11.5px;color:#9aa0a6;margin:14px 0 0;line-height:1.4}
  /* Gate como OVERLAY (fora do livro): dentro do StPageFlip o <input> não recebe
     o toque (a lib só repassa toque p/ <a> e <button>), então no celular o campo
     não era editável. Em overlay é DOM normal — o teclado abre ao tocar. z-15 fica
     acima do livro, mas abaixo das setas (18) e da toolbar (20): dá pra voltar à prévia. */
  #gate{position:absolute;inset:0;z-index:15}
  #gate[hidden]{display:none}
  #gate>.page-gate{position:absolute;inset:0}
  #reader.gate-open .edge{display:none}

  /* ---- floating "air" controls ---- */
  .air{position:absolute;z-index:20;display:flex;align-items:center;gap:2px;padding:5px;
    border-radius:999px;background:var(--glass);border:1px solid var(--stroke);box-shadow:var(--shadow);
    -webkit-backdrop-filter:blur(15px) saturate(1.25);backdrop-filter:blur(15px) saturate(1.25);
    color:var(--ink);max-width:calc(100vw - 20px)}
  .air[hidden]{display:none}
  #toolbar{top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none}
  #toolbar::-webkit-scrollbar{display:none}
  #pager{top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));padding:3px 4px}
  #zoombar{bottom:max(14px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%)}
  #searchbar{top:calc(max(12px,env(safe-area-inset-top)) + 58px);left:50%;transform:translateX(-50%);
    gap:4px;padding:5px 8px}
  .ab{flex:0 0 auto;width:38px;height:38px;border:0;border-radius:50%;background:transparent;color:inherit;
    display:grid;place-items:center;cursor:pointer;transition:background .14s,opacity .14s,color .14s}
  .ab:hover{background:rgba(255,255,255,.1)}
  .ab:active{background:rgba(255,255,255,.16)}
  .ab svg{width:20px;height:20px}
  .ab[aria-pressed="true"]{color:var(--accent)}
  .ab.off{opacity:.32;pointer-events:none}
  .ab:focus-visible,#pageLabel:focus-visible,.gate-form :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .sep{flex:0 0 auto;width:1px;height:22px;background:rgba(255,255,255,.16);margin:0 3px}
  #pageLabel{border:0;background:transparent;color:var(--ink);font-size:13px;font-weight:600;letter-spacing:.01em;
    padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  #pageLabel:hover{background:rgba(255,255,255,.1)}
  #pager input[type=number]{width:64px;height:34px;border:1px solid var(--stroke);border-radius:999px;
    background:rgba(0,0,0,.25);color:var(--ink);text-align:center;font-size:14px;outline:none;
    -moz-appearance:textfield;margin:0 2px}
  #pager input::-webkit-outer-spin-button,#pager input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

  /* edge nav arrows */
  .edge{position:absolute;z-index:18;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;
    border:1px solid var(--stroke);background:var(--glass);color:var(--ink);display:grid;place-items:center;cursor:pointer;
    box-shadow:var(--shadow);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:opacity .15s,background .15s}
  .edge svg{width:22px;height:22px}
  .edge:hover{background:rgba(40,44,52,.8)}
  .edge.left{left:max(10px,env(safe-area-inset-left))}
  .edge.right{right:max(10px,env(safe-area-inset-right))}
  .edge:disabled{opacity:.28;pointer-events:none}

  /* pan capture overlay (only active while zoomed) */
  #panCatcher{position:absolute;inset:0;z-index:6;pointer-events:none;touch-action:none}
  #reader.zoomed #panCatcher{pointer-events:auto}
  #reader.zoomed.pan-hand #panCatcher{cursor:grab}
  #reader.zoomed.pan-hand #panCatcher:active{cursor:grabbing}
  #reader.zoomed.pan-pointer #panCatcher{cursor:crosshair}

  /* search input */
  #searchInput{height:34px;width:min(46vw,260px);border:0;background:transparent;color:var(--ink);font-size:14px;outline:none}
  #searchInput::placeholder{color:var(--ink-dim)}
  #searchCount{font-size:12px;color:var(--ink-dim);min-width:34px;text-align:center;white-space:nowrap}

  /* loader + toast */
  #loader{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;gap:14px;align-items:center;
    justify-content:center;color:var(--ink-dim);font-size:13px;background:radial-gradient(60% 60% at 50% 50%,rgba(0,0,0,.18),transparent)}
  .spinner{width:30px;height:30px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:var(--accent);
    animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast{position:absolute;z-index:50;bottom:78px;left:50%;transform:translateX(-50%) translateY(8px);
    background:var(--glass-2);border:1px solid var(--stroke);color:var(--ink);font-size:13px;padding:9px 16px;border-radius:999px;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:760px){
    .ab{width:34px;height:34px}.ab svg{width:18px;height:18px}
    #pageLabel{font-size:12px;padding:6px 9px}
    .edge{width:42px;height:42px}
  }
  @media (prefers-reduced-motion:reduce){
    .ab,.edge,#toast{transition:none}.spinner{animation-duration:0s}
  }
</style>
</head>
<body>
  <div id="reader">
    <div id="viewport">
      <div id="stage"><div id="book"></div></div>
      <div id="panCatcher" aria-hidden="true"></div>

      <button class="edge left"  data-act="prev" id="edgePrev" aria-label="Página anterior"></button>
      <button class="edge right" data-act="next" id="edgeNext" aria-label="Próxima página"></button>

      <div id="toolbar" class="air" role="toolbar" aria-label="Controles de leitura"></div>

      <div id="pager" class="air">
        <button id="pageLabel" data-act="pager" aria-label="Ir para a página">…</button>
      </div>

      <div id="zoombar" class="air" role="toolbar" aria-label="Controles de zoom" hidden></div>

      <div id="searchbar" class="air" role="search" hidden>
        <input id="searchInput" type="search" placeholder="Buscar no documento…" aria-label="Buscar no documento" autocomplete="off">
        <span id="searchCount" aria-live="polite"></span>
        <button class="ab" data-act="searchPrev" aria-label="Resultado anterior"></button>
        <button class="ab" data-act="searchNext" aria-label="Próximo resultado"></button>
        <button class="ab" data-act="searchClose" aria-label="Fechar busca"></button>
      </div>

      <div id="gate" hidden></div>
      <div id="toast" role="status"></div>
      <div id="loader"><div class="spinner"></div><span>Carregando…</span></div>
    </div>
  </div>

  var PAGE_TEXT = ["REVISTAIRC Instituto Roy Carlson Nº 1 ■ Junho de 2026 De ontem até hoje, do Brasil para o mundo ■ \u0007Roy W. Carlson: o engenheiro que ajudou o Brasil a dominar o concreto-massa ■ \u0007Walton Pacelli e a paixão pelas barragens", "2 ■ REVISTA IRC ■ JUNHO DE 2026", "JUNHO DE 2026 ■ REVISTA IRC ■ 3 Instituto Roy Carlson SIGA TODAS AS ATIVIDADES EM: institutoroycarlson.com OU https://www.linkedin.com/company/instituto-roy-carlson/", "4 ■ REVISTA IRC ■ JUNHO DE 2026 MERCADO INTERNACIONAL 6 ENGENHARIA DE BARRAGENS NA CHINA: PERSPECTIVAS PARA A EXPERTISE BRASILEIRA EM TECNOLOGIA DE CONCRETO NACIONAL MEMÓRIA TÉCNICA 12 HISTÓRICO DA TECNOLOGIA DO CONCRETO MASSA NO BRASIL REMINISCÊNCIAS – PARTE 1 20 ROY CARLSON ANTES DAS BARRAGENS: INFÂNCIA, FÍSICA E OS PRIMEIROS PROBLEMAS DE ENGENHARIA HOMENAGENS: DR. ROY CARLSON 26 WALTON PACELLI DE ANDRADE 32 ARTIGO TÉCNICO 40 DAMWORLD, 2025 O CONSELHO EDITORIAL: ELCIO ANTONIO GUERRA JOSÉ TOMÁS FRANÇA FONTOURA JOÃO BOSCO MOREIRA DO CARMO EDITOR CHEFE: FLÁVIO MAMEDE PROJETO GRÁFICO E DIAGRAMAÇÃO ANTONIO RHODEN FOTO DA CAPA: ITAIPU BINACIONAL", "JUNHO DE 2026 ■ REVISTA IRC ■ 5 FOTO: MARIORDO (MARIO ROBERTO DURÁN ORTIZ), 2017.", "6 ■ REVISTA IRC ■ JUNHO DE 2026 MERCADO INTERNACIONAL Engenharia de barragens na China: perspectivas para a expertise brasileira em tecnologia de concreto O mercado de construção de barragens na Re­ pública Popular da China atravessou uma metamorfose profunda nas últimas três décadas, evoluindo de uma fase de dependência tecnológi­ ca internacional para uma era de autossuficiência e liderança global em engenharia hidráulica. Para consultores independentes operando a partir do Brasil, particularmente aqueles vinculados ao legado de excelência técnica representado por fi­ guras como Walton Pacelli de Andrade, Francisco Rodrigues Andriolo, entre outros, o cenário atual exige uma transição de modelos de consultoria geral para nichos de ultraespecialização.1 A aná­ lise do ecossistema chinês contemporâneo revela que, embora as grandes corporações estatais te­ nham internalizado grande parte da engenharia básica, a complexidade sem precedentes dos no­ vos projetos em condições geológicas extremas e o surto de projetos de armazenamento bombeado (Pumped Storage Hydropower - PSH) criam lacu­ nas críticas que demandam validação e otimiza­ ção por especialistas internacionais de alto nível.3 A relevância da expertise brasileira, historica­ mente consolidada em grandes empreendimen­ tos como as usinas de Furnas e Itaipu, mantém um significativo valor simbólico e técnico no ter­ ritório chinês.1 O trabalho de Walton Pacelli de Andrade em projetos como a barragem de Jian­ gya e sua participação ativa na Comissão Inter­ nacional de Grandes Barragens (ICOLD) estabe­ leceram um precedente de cooperação que pode ser capitalizado para a prestação de serviços fo­ cados em análises térmicas, dosagens de concre­ to de alto desempenho e otimização de processos construtivos.2", "JUNHO DE 2026 ■ REVISTA IRC ■ 7 O panorama dos grandes empreendimentos e a fronteira hidroenergética A China mantém o programa de construção de barragens mais ambicioso do planeta, impul­ sionado por uma meta de neutralidade de carbo­ no e segurança energética.7 Os projetos atuais não são apenas maiores em escala, mas significativa­ mente mais complexos em termos de termodinâ­ mica e mecânica de rochas. O projeto da grande curvatura do rio Yarlung Tsangpo No sudeste do Tibete, a China planeja o que será a maior instalação hidrelétrica do mundo, com uma capacidade projetada entre 67 GW e 80 GW — aproximadamente o triplo da Usina de Três Gargantas.7 Este projeto, com custo estima­ do superior a US$ 160 bilhões, representa o de­ safio supremo para especialistas em concreto.3 A construção em altitudes extremas e sob varia­ ções térmicas severas exige cálculos de pós-refri­ geração e controle de calor de hidratação de uma precisão que poucas instituições globais conse­ guem validar. A necessidade de análise de ten­ sões térmicas em estruturas de concreto massa nestas condições é um dos principais pontos de entrada para consultores seniores.8 A expansão das usinas de armazenamento bombeado (PSH) Diferente das barragens de fluxo contínuo, as PSHs são a prioridade absoluta para o equilíbrio da rede elétrica chinesa. A China Three Gorges (CTG) Corporation possui atualmente 18,8 GW de PSH em operação ou construção, com um pipeli­ ne que ultrapassa 70 GW.4 Estes projetos utilizam predominantemente barragens de enrocamento com face de concreto (CFRD) ou asfalto, exigindo inovações em dosa­ gens de aditivos químicos para garantir a imper­ meabilidade sob altas pressões hidrostáticas.9 US GEOLOGICAL SURVEY / DOMÍNIO PÚBLICO (USGS)", "8 ■ REVISTA IRC ■ JUNHO DE 2026 Mapeamento de Construtoras e Institutos de Design: Os Gatekeepers do Mercado A estrutura de decisão na engenharia chinesa é al­ tamente hierarquizada. Para o consultor indepen­ dente, a porta de entrada não é a obra em si, mas sim os Institutos de Pesquisa e Design (Design Ins­ titutes - DIs) e as grandes estatais de construção.11 O Complexo PowerChina e seus Institutos Regionais A Power Construction Corporation of China (PowerChina) é a entidade dominante, responsá­ vel por mais de 80% do planejamento e design de projetos hidrelétricos no país.13 A empresa opera através de institutos regionais que possuem auto­ nomia técnica e financeira considerável. O acesso a estes institutos é vital, pois eles são responsáveis pela elaboração das especificações técnicas que os prestadores de serviços e labora­ tórios de controle tecnológico devem seguir.11 China Three Gorges (CTG) e o Corredor de Energia Limpa A CTG é a proprietária e operadora das maio­ res usinas do Rio Yangtzé, incluindo Wudongde e Baihetan.3 A CTG Brasil, como subsidiária, fun­ ciona como um canal estratégico de intercâmbio de talentos e tecnologias entre o Brasil e a China.17 Consultores brasileiros podem utilizar a estrutura da CTG Brasil para identificar demandas específi­ cas de consultoria de “retaguarda” em projetos na China, especialmente em inovação e P&D.17 Ecossistema de prestadores de serviços especializados Para fornecer serviços de dosagem, análise tér­ mica e injeção, é necessário mapear os parceiros tecnológicos com os quais os Institutos de Design colaboram. Laboratórios de Controle Tecnológico e Pesquisa O principal órgão de validação científica na China é o China Institute of Water Resources and Hy­ dropower Research (IWHR).19 Situado em Pequim, o IWHR gerencia os padrões profissionais e reali­ za as tarefas de consultoria mais complexas para centenas de projetos-chave.20 Outra instituição fundamental é a Hohai University em Nanjing, cujo colégio de engenharia hidráulica é o centro de formação da elite técnica do setor.22 Empresas de Aditivos Químicos e Materiais Especiais O mercado de aditivos químicos para concreto massa e concreto compactado com rolo (CCR) é dominado por empresas que oferecem o que chamam de “marketing consultivo”, onde o produto é vendido junto com o suporte técnico de dosagem.23 ▶Sobute New Materials (Jiangsu Subote): É a líder tecnológica, possuidora de laboratórios estatais chave e envolvida em projetos como Baihetan e Wudongde.23 Eles se especializam em aditivos para ambientes agressivos e condi­ ções de serviço adversas.23 ▶Chongqing Borida Construction Materials: Focada em aceleradores de pega e redutores de água para projetos no sudoeste da China e ferrovias de alta velocidade.25 Possuem uma rede de consultoria técnica local que pode ser um parceiro para especialistas em otimização de traços.24 ▶WOTAIchem: Especializada em aditivos para impermeabilização e construção em clima frio, fornecendo soluções para controle de secagem rápida e retenção de água.27 Geotecnia, Injeção e Projetos Especiais Empresas como a QingYuan Engineering Consul­ tants (QYEC) representam a elite das empresas privadas de classe A em consultoria hidrelétrica, com expertise em barragens de face de concreto em fundações profundas.28 Já a China Gezhouba Group (CGGC) é a gigante da execução, especiali­ zada em barragens, estradas e pontes, com forte", "JUNHO DE 2026 ■ REVISTA IRC ■ 9 atuação internacional.29 Na área de investigação geotécnica e fundações, a China Hebei Construc­ tion & Geotechnical Investigation Group desta­ ca-se pela pesquisa em novos métodos de injeção e monitoramento.30 Especialização Técnica: Análise Térmica e Otimização de Processos A demanda por consultores independentes resi­ de na capacidade de realizar cálculos complexos que evitam o surgimento de fissuras térmicas, um problema crítico em barragens de grande volume. O Desafio da Termodinâmica em Barragens de Concreto A hidratação do cimento e as mudanças climáticas nas fronteiras convectivas são as duas principais fontes de calor que geram gradientes térmicos perigosos.31 A análise térmica moderna na China utiliza simulações numéricas tridimensionais que consideram a operação do reservatório e o crono­ grama de concretagem.8 Para o cálculo da necessidade de gelo e pré-re­ frigeração, o consultor deve considerar a tempe­ ratura adiabática do concreto, frequentemente modelada pela equação: Onde é a temperatura na idade , e os parâ­ metros e dependem da composição química do cimento e dos aditivos utilizados.32 O domínio dessas modelagens, integrando parâmetros de flu­ ência e módulos de elasticidade variáveis, é o que define a “rebarba” de serviços altamente técnicos mencionada na solicitação.31 Otimização de Traços e Processos Construtivos A otimização não se limita apenas à resistência mecânica, mas à minimização da pegada de car­ bono e do calor exotérmico. O uso de materiais pozolânicos, como cinzas volantes e escória, é pa­ drão, mas a proporção ideal para garantir a tra­ balhabilidade em barragens de CCR exige testes de laboratório exaustivos e validação de campo.2 O consultor independente atua na interface en­ tre a teoria laboratorial e a execução em larga es­ cala, especificando sistemas de pós-refrigeração (serpentinas de água) e monitoramento térmico em tempo real.8 Caminhos Estratégicos para a Prestação de Serviços do Brasil Estar fisicamente no Brasil não é um impedimen­ to total, dado o modelo de colaboração digital e a rede de contatos internacionais. Contudo, a for­ malização é essencial para acessar os pagamentos e contratos das estatais chinesas. O Sistema de Vistos e Permissões para Especialistas A China categoriza talentos estrangeiros em três níveis (A, B e C). Consultores com a trajetória de Walton Pacelli enquadram-se na Categoria A (Ta­ lentos de alto nível e especialistas urgentemente necessários).33 ▶Visto R (Talento): Projetado para especialis­ tas de alto nível, permite estadias longas e múl­ tiplas entradas, sendo mais fácil de renovar que o visto de trabalho padrão (Z).33 ▶Visto K (Ciência e Tecnologia): Introduzido recentemente para facilitar o intercâmbio de talentos científicos e tecnológicos.33 O processo exige que o empregador chinês (como um Instituto de Design ou o IWHR) solicite uma licença de emprego e uma notificação de per­ missão de trabalho antes que o especialista entre no país.33 Canais de Networking e Captação de Projetos O meio mais eficaz de chegar a essas prestações de serviço é através de plataformas de intercâmbio técnico e conferências internacionais. 1. Congresso ICOLD 2025 em Chengdu: O 28º Congresso Mundial da ICOLD ocorrerá em maio de 2025 na China, organizado pelo Ministério de Recursos Hídricos e pela CHINCOLD.35 Este é o epicentro do networking global, onde os chefes dos Institutos de Design e das construtoras es­ tarão presentes.37", "10 ■ REVISTA IRC ■ JUNHO DE 2026 2. Plataforma CHINCOLD: O Comitê Nacional Chinês de Grandes Barragens (CHINCOLD) oferece planos de adesão para membros indi­ viduais, proporcionando acesso a especialistas, fóruns de perguntas e respostas e literatura téc­ nica valiosa.38 3. Cooperação via CTG Brasil: A utilização dos canais de P&D da ANEEL, nos quais a CTG Bra­ sil é ativa, permite a criação de projetos de pes­ quisa que incluam consultores seniores como “experts internacionais”, facilitando a ponte técnica com a matriz na China.17 Síntese de oportunidades e plano de ação A consultoria em barragens na China para um especialista brasileiro deve ser encarada como uma operação de “nicho de luxo tecnológico”. O mercado não busca mais engenheiros para fun­ ções rotineiras, mas sim “videntes térmicos” e “estrategistas de materiais” que possam prever e mitigar falhas estruturais em projetos de alto risco político e econômico. Áreas de foco para captação de serviços O caminho mais curto para reativar essas consultorias envolve a submissão de artigos téc­ nicos ou palestras no Congresso da ICOLD em Chengdu.36 A visibilidade acadêmica e profissio­ nal nessas instâncias é o que valida o status de “Class A Talent” perante as autoridades chine­ sas, permitindo que o consultor independente seja contratado como um assessor estratégico de alto nível, independentemente de sua locali­ zação geográfica inicial. A integração da experi­ ência prática brasileira com as ferramentas de simulação digital de última geração representa a proposta de valor mais robusta para o merca­ do chinês em 2025-2030. Referências citadas 1. A história de vida de Walton Pacelli de Andrade: Memórias das coisas bem-feitas, acessado em março 17, 2026, https://museudapessoa.org/histo­ ria-de-vida/mem-rias-das-coisas-bem-feitas/ 2. Maciços experimentais de laboratório de con­ creto compactado com rolo aplicado às bar­ ragens - Lume inicial, acessado em março 17, 2026, https://lume.ufrgs.br/bitstream/hand­ le/10183/25436/000751653.pdf 3. Hydropower playing bigger role in energy secu­ rity - Chinadaily.com.cn, acessado em março 17, 2026, https://www.chinadaily.com.cn/a/202510/21/ WS68f6e517a310f735438b6118.html 4. China Three Gorges (Brazil) Co., Ltd. March, 2025 - GOV, acessado em março 17, 2026, ht­ tps://www.gov.br/mme/pt-br/assuntos/noti­ cias/20250320BrazilPumpedStora
