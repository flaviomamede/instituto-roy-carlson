<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<!-- "Adicionar à Tela de Início": abre como app, em tela cheia, sem as barras do Safari
     (no iPhone não há outra forma de esconder a barra de endereços/abas numa aba normal). -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Revista IRC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#13161c">
<title>Revista Concreto — Instituto Roy Carlson</title>
<style>
  :root{
    --bg:#171a1f; --bg2:#0f1115;
    --glass:rgba(22,25,30,.62); --glass-2:rgba(18,21,26,.9);
    --stroke:rgba(255,255,255,.13);
    --ink:#e9ecef; --ink-dim:#aab1ba;
    --accent:#c79a3e; --accent-ink:#1a1407;
    --shadow:0 10px 34px rgba(0,0,0,.42);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overflow:hidden;-webkit-text-size-adjust:100%;-webkit-tap-highlight-color:transparent}
  #reader{position:fixed;top:0;left:0;width:100%;height:100vh;height:100dvh;
    background:radial-gradient(125% 95% at 50% 0%, #1e222a 0%, var(--bg) 46%, var(--bg2) 100%)}
  #viewport{position:absolute;inset:0;overflow:hidden;touch-action:none}
  #stage{position:absolute;inset:0;transform-origin:50% 50%;will-change:transform;
    transform:translate3d(0,0,0) scale(1);backface-visibility:hidden}
  #book{width:100%;height:100%}
  #book .page{background:#fff;overflow:hidden}
  #book .page img{display:block;width:100%;height:100%;object-fit:contain;
    -webkit-user-drag:none;user-select:none;pointer-events:none}

  /* ---- e-mail gate page ---- */
  .page-gate{background:linear-gradient(180deg,#fbfaf6 0%,#f0eadc 100%);color:#23262b;
    display:flex;align-items:center;justify-content:center;padding:7% 6%}
  .gate-inner{max-width:340px;text-align:center}
  .gate-lock{width:56px;height:56px;margin:0 auto 16px;border-radius:50%;display:grid;place-items:center;
    background:#fff;border:1px solid #e7dec8;box-shadow:0 8px 22px rgba(0,0,0,.08)}
  .gate-lock svg{width:24px;height:24px;color:var(--accent)}
  .page-gate h2{font-size:23px;line-height:1.16;margin:0 0 8px;font-weight:750;letter-spacing:-.015em}
  .page-gate p.lede{font-size:14px;line-height:1.5;color:#5c6066;margin:0 0 18px}
  .gate-form{display:flex;flex-direction:column;gap:10px;text-align:left}
  .gate-form input{height:44px;border-radius:11px;border:1px solid #d8cfbb;background:#fff;padding:0 14px;
    font-size:15px;color:#23262b;outline:none;width:100%}
  .gate-form input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(199,154,62,.22)}
  #leadBtn{height:46px;border:0;border-radius:11px;background:var(--accent);color:var(--accent-ink);
    font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.01em}
  #leadBtn:hover{filter:brightness(1.05)}
  #leadBtn:disabled{opacity:.6;cursor:default}
  .gate-msg{min-height:18px;font-size:13px;color:#9a6a14;text-align:center;margin-top:2px}
  .gate-fine{font-size:11.5px;color:#9aa0a6;margin:14px 0 0;line-height:1.4}
  /* Gate como OVERLAY (fora do livro): dentro do StPageFlip o <input> não recebe
     o toque (a lib só repassa toque p/ <a> e <button>), então no celular o campo
     não era editável. Em overlay é DOM normal — o teclado abre ao tocar. z-15 fica
     acima do livro, mas abaixo das setas (18) e da toolbar (20): dá pra voltar à prévia. */
  #gate{position:absolute;inset:0;z-index:15}
  #gate[hidden]{display:none}
  #gate>.page-gate{position:absolute;inset:0}
  #reader.gate-open .edge{display:none}

  /* ---- floating "air" controls ---- */
  .air{position:absolute;z-index:20;display:flex;align-items:center;gap:2px;padding:5px;
    border-radius:999px;background:var(--glass);border:1px solid var(--stroke);box-shadow:var(--shadow);
    -webkit-backdrop-filter:blur(15px) saturate(1.25);backdrop-filter:blur(15px) saturate(1.25);
    color:var(--ink);max-width:calc(100vw - 20px)}
  .air[hidden]{display:none}
  #toolbar{top:max(12px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none}
  #toolbar::-webkit-scrollbar{display:none}
  #pager{top:max(12px,env(safe-area-inset-top));right:max(12px,env(safe-area-inset-right));padding:3px 4px}
  #zoombar{bottom:max(14px,env(safe-area-inset-bottom));left:50%;transform:translateX(-50%)}
  #searchbar{top:calc(max(12px,env(safe-area-inset-top)) + 58px);left:50%;transform:translateX(-50%);
    gap:4px;padding:5px 8px}
  .ab{flex:0 0 auto;width:38px;height:38px;border:0;border-radius:50%;background:transparent;color:inherit;
    display:grid;place-items:center;cursor:pointer;transition:background .14s,opacity .14s,color .14s}
  .ab:hover{background:rgba(255,255,255,.1)}
  .ab:active{background:rgba(255,255,255,.16)}
  .ab svg{width:20px;height:20px}
  .ab[aria-pressed="true"]{color:var(--accent)}
  .ab.off{opacity:.32;pointer-events:none}
  .ab:focus-visible,#pageLabel:focus-visible,.gate-form :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  .sep{flex:0 0 auto;width:1px;height:22px;background:rgba(255,255,255,.16);margin:0 3px}
  #pageLabel{border:0;background:transparent;color:var(--ink);font-size:13px;font-weight:600;letter-spacing:.01em;
    padding:7px 12px;border-radius:999px;cursor:pointer;white-space:nowrap}
  #pageLabel:hover{background:rgba(255,255,255,.1)}
  #pager input[type=number]{width:64px;height:34px;border:1px solid var(--stroke);border-radius:999px;
    background:rgba(0,0,0,.25);color:var(--ink);text-align:center;font-size:14px;outline:none;
    -moz-appearance:textfield;margin:0 2px}
  #pager input::-webkit-outer-spin-button,#pager input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

  /* edge nav arrows */
  .edge{position:absolute;z-index:18;top:50%;transform:translateY(-50%);width:48px;height:48px;border-radius:50%;
    border:1px solid var(--stroke);background:var(--glass);color:var(--ink);display:grid;place-items:center;cursor:pointer;
    box-shadow:var(--shadow);-webkit-backdrop-filter:blur(12px);backdrop-filter:blur(12px);transition:opacity .15s,background .15s}
  .edge svg{width:22px;height:22px}
  .edge:hover{background:rgba(40,44,52,.8)}
  .edge.left{left:max(10px,env(safe-area-inset-left))}
  .edge.right{right:max(10px,env(safe-area-inset-right))}
  .edge:disabled{opacity:.28;pointer-events:none}

  /* pan capture overlay (only active while zoomed) */
  #panCatcher{position:absolute;inset:0;z-index:6;pointer-events:none;touch-action:none}
  #reader.zoomed #panCatcher{pointer-events:auto}
  #reader.zoomed.pan-hand #panCatcher{cursor:grab}
  #reader.zoomed.pan-hand #panCatcher:active{cursor:grabbing}
  #reader.zoomed.pan-pointer #panCatcher{cursor:crosshair}

  /* search input */
  #searchInput{height:34px;width:min(46vw,260px);border:0;background:transparent;color:var(--ink);font-size:14px;outline:none}
  #searchInput::placeholder{color:var(--ink-dim)}
  #searchCount{font-size:12px;color:var(--ink-dim);min-width:34px;text-align:center;white-space:nowrap}

  /* loader + toast */
  #loader{position:absolute;inset:0;z-index:40;display:flex;flex-direction:column;gap:14px;align-items:center;
    justify-content:center;color:var(--ink-dim);font-size:13px;background:radial-gradient(60% 60% at 50% 50%,rgba(0,0,0,.18),transparent)}
  .spinner{width:30px;height:30px;border-radius:50%;border:3px solid rgba(255,255,255,.18);border-top-color:var(--accent);
    animation:spin .9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #toast{position:absolute;z-index:50;bottom:78px;left:50%;transform:translateX(-50%) translateY(8px);
    background:var(--glass-2);border:1px solid var(--stroke);color:var(--ink);font-size:13px;padding:9px 16px;border-radius:999px;
    box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:760px){
    .ab{width:34px;height:34px}.ab svg{width:18px;height:18px}
    #pageLabel{font-size:12px;padding:6px 9px}
    .edge{width:42px;height:42px}
  }
  @media (prefers-reduced-motion:reduce){
    .ab,.edge,#toast{transition:none}.spinner{animation-duration:0s}
  }
</style>
</head>
<body>
  <div id="reader">
    <div id="viewport">
      <div id="stage"><div id="book"></div></div>
      <div id="panCatcher" aria-hidden="true"></div>

      <button class="edge left"  data-act="prev" id="edgePrev" aria-label="Página anterior"></button>
      <button class="edge right" data-act="next" id="edgeNext" aria-label="Próxima página"></button>

      <div id="toolbar" class="air" role="toolbar" aria-label="Controles de leitura"></div>

      <div id="pager" class="air">
        <button id="pageLabel" data-act="pager" aria-label="Ir para a página">…</button>
      </div>

      <div id="zoombar" class="air" role="toolbar" aria-label="Controles de zoom" hidden></div>

      <div id="searchbar" class="air" role="search" hidden>
        <input id="searchInput" type="search" placeholder="Buscar no documento…" aria-label="Buscar no documento" autocomplete="off">
        <span id="searchCount" aria-live="polite"></span>
        <button class="ab" data-act="searchPrev" aria-label="Resultado anterior"></button>
        <button class="ab" data-act="searchNext" aria-label="Próximo resultado"></button>
        <button class="ab" data-act="searchClose" aria-label="Fechar busca"></button>
      </div>

      <div id="gate" hidden></div>
      <div id="toast" role="status"></div>
      <div id="loader"><div class="spinner"></div><span>Carregando…</span></div>
    </div>
  </div>

  <script>/*__STF__*/</script>
  <script>
  (function(){
  "use strict";

  /* ============ CONFIG — edite aqui ============ */
  var PREVIEW_PAGES = 4;      // páginas livres; ao tentar passar daqui, abre o gate de e-mail
  var LEAD_ENDPOINT = "";     // URL para POST do lead (ex.: Google Apps Script). "" = modo demo (só libera)
  var DOC_TITLE     = "A medida quase direta de tensões de compressão no concreto — Roy W. Carlson";
  var SHARE_URL     = (location.protocol.indexOf("http")===0 ? location.href : ""); // link canônico p/ compartilhar
  var AUTOPLAY_MS   = 4200;
  var MIN_ZOOM=1, MAX_ZOOM=3.4, ZOOM_START=1.85, ZOOM_STEP=0.5;
  /* ============================================= */

  var PAGES = __PAGES__;
  var PAGE_TEXT = __PAGE_TEXT__;
  var TOTAL = PAGES.length;

  var I = {
    search:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.6-3.6"/>',
    zoomIn:'<circle cx="11" cy="11" r="7"/><path d="m20 20-3.6-3.6M11 8.2v5.6M8.2 11h5.6"/>',
    play:'<path d="M8 5.5v13l11-6.5z" fill="currentColor" stroke="none"/>',
    pause:'<path d="M7 5h3.1v14H7zM13.9 5H17v14h-3.1z" fill="currentColor" stroke="none"/>',
    first:'<path d="M7 5v14"/><path d="M19 6 9 12l10 6z" fill="currentColor" stroke="none"/>',
    prev:'<path d="M15 5 8 12l7 7"/>',
    next:'<path d="M9 5l7 7-7 7"/>',
    last:'<path d="M17 5v14"/><path d="M5 6l10 6L5 18z" fill="currentColor" stroke="none"/>',
    share:'<circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="m8.3 13.4 7.4 4.3M15.7 6.3 8.3 10.6"/>',
    mail:'<rect x="3" y="5.5" width="18" height="13" rx="2.2"/><path d="m4 7 8 5.4L20 7"/>',
    expand:'<path d="M8 3H5.5A2.5 2.5 0 0 0 3 5.5V8M16 3h2.5A2.5 2.5 0 0 1 21 5.5V8M21 16v2.5a2.5 2.5 0 0 1-2.5 2.5H16M3 16v2.5A2.5 2.5 0 0 0 5.5 21H8"/>',
    compress:'<path d="M8 3v2.5A2.5 2.5 0 0 1 5.5 8H3M21 8h-2.5A2.5 2.5 0 0 1 16 5.5V3M3 16h2.5A2.5 2.5 0 0 1 8 18.5V21M16 21v-2.5a2.5 2.5 0 0 1 2.5-2.5H21"/>',
    plus:'<path d="M12 5v14M5 12h14"/>',
    minus:'<path d="M5 12h14"/>',
    hand:'<path d="M18 11.5V7a1.6 1.6 0 0 0-3.2 0M14.8 10.5V5.2a1.6 1.6 0 0 0-3.2 0v5.3M11.6 10.5V6a1.6 1.6 0 0 0-3.2 0v8.4l-1.6-1.9a1.7 1.7 0 0 0-2.5 2.2l2.9 3.6A6 6 0 0 0 9.7 22h3.1A5.2 5.2 0 0 0 18 16.8v-5.3a1.6 1.6 0 0 0-3.2 0"/>',
    pointer:'<path d="M5 3.4 12 17l1.9-4.9L18.8 10z" fill="currentColor" stroke="none"/><path d="M17.4 15.5v4M15.4 17.5h4"/>',
    x:'<path d="M6 6l12 12M18 6 6 18"/>',
    lock:'<rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>'
  };

  function $(id){return document.getElementById(id);}
  function clamp(v,a,b){return v<a?a:(v>b?b:v);}
  function svg(p){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+p+'</svg>';}
  function qa(sel){return Array.prototype.slice.call(document.querySelectorAll(sel));}

  var reader=$("reader"), viewport=$("viewport"), stage=$("stage"), book=$("book"),
      catcher=$("panCatcher"), loader=$("loader"), toolbar=$("toolbar"),
      zoombar=$("zoombar"), pager=$("pager"), searchbar=$("searchbar");

  var pf=null, unlocked=false, busy=false;
  var zoom=1,tzoom=1,panX=0,panY=0,tpanX=0,tpanY=0,raf=null;
  var coarse = window.matchMedia && matchMedia("(pointer:coarse)").matches;
  var reduce = window.matchMedia && matchMedia("(prefers-reduced-motion:reduce)").matches;
  var panMode = coarse ? "hand" : "pointer";
  var dragging=false,dsx=0,dsy=0,dpx=0,dpy=0;
  var pinching=false,pinchD=0,pinchZ=1;
  var autoTimer=null, wheelLock=0;
  var leafLabels=[];
  var hits=[], hitIdx=-1, searchT=null;

  /* ---------- build toolbars ---------- */
  function mkbtn(act,icon,label){
    var b=document.createElement("button");
    b.type="button"; b.className="ab"; b.setAttribute("data-act",act);
    b.setAttribute("aria-label",label); b.title=label; b.innerHTML=svg(icon);
    return b;
  }
  function sep(){var s=document.createElement("span");s.className="sep";return s;}
  function fill(el,items){
    items.forEach(function(it){ el.appendChild(it==="|"?sep():mkbtn(it[0],it[1],it[2])); });
  }
  fill(toolbar,[
    ["zoomIn",I.zoomIn,"Ampliar (zoom)"],
    ["search",I.search,"Buscar no documento"],
    ["play",I.play,"Apresentação automática"],
    "|",
    ["first",I.first,"Primeira página"],
    ["prev",I.prev,"Página anterior"],
    ["next",I.next,"Próxima página"],
    ["last",I.last,"Última página"],
    "|",
    ["share",I.share,"Compartilhar"],
    ["email",I.mail,"Enviar por e-mail"],
    ["fullscreen",I.expand,"Tela cheia"]
  ]);
  fill(zoombar,[
    ["zPlus",I.plus,"Mais zoom"],
    ["zMinus",I.minus,"Menos zoom"],
    ["zFit",I.search,"Ajustar (100%)"],
    "|",
    ["prev",I.prev,"Página anterior"],
    ["next",I.next,"Próxima página"],
    "|",
    ["panToggle",I.pointer,"Modo de navegação"],
    ["zClose",I.x,"Fechar zoom"]
  ]);
  $("edgePrev").innerHTML=svg(I.prev);
  $("edgeNext").innerHTML=svg(I.next);
  qa('#searchbar [data-act="searchPrev"]')[0].innerHTML=svg(I.prev);
  qa('#searchbar [data-act="searchNext"]')[0].innerHTML=svg(I.next);
  qa('#searchbar [data-act="searchClose"]')[0].innerHTML=svg(I.x);

  /* ---------- book DOM + flip engine ---------- */
  /* Folha do livro (só visual — o form de verdade vive no overlay #gate). */
  function gateHTML(){
    return '<div class="gate-inner">'
      +'<div class="gate-lock">'+svg(I.lock)+'</div>'
      +'<h2>Continue a leitura</h2>'
      +'<p class="lede">Você chegou ao fim da prévia. Informe seu e-mail para ler o artigo completo — é gratuito.</p>'
      +'<p class="gate-fine">Sem spam. Seu e-mail é usado apenas para novidades do Instituto Roy Carlson.</p>'
    +'</div>';
  }
  /* Card do overlay #gate — com o formulário real (DOM fora do livro). */
  function gateCardHTML(){
    return '<div class="page-gate"><div class="gate-inner">'
      +'<div class="gate-lock">'+svg(I.lock)+'</div>'
      +'<h2>Continue a leitura</h2>'
      +'<p class="lede">Você chegou ao fim da prévia. Informe seu e-mail para ler o artigo completo — é gratuito.</p>'
      +'<div class="gate-form">'
        +'<input id="leadName" type="text" placeholder="Seu nome (opcional)" autocomplete="name">'
        +'<input id="leadEmail" type="email" placeholder="seu@email.com" autocomplete="email" inputmode="email" required>'
        +'<button id="leadBtn" type="button">Liberar leitura completa</button>'
        +'<div class="gate-msg" id="leadMsg" role="status"></div>'
      +'</div>'
      +'<p class="gate-fine">Sem spam. Seu e-mail é usado apenas para novidades do Instituto Roy Carlson.</p>'
    +'</div></div>';
  }
  /* Mostra/esconde o overlay do gate. O form é montado uma vez (no boot). */
  function showGate(on){
    var g=$("gate"); if(!g) return;
    reader.classList.toggle("gate-open", !!on);  /* esconde as setas sobre os campos */
    if(on){ if(g.hidden){ g.hidden=false; focusGate(); } }
    else { if(!g.hidden){ g.hidden=true; } }
  }
  function buildBookDOM(preview){
    book.innerHTML=""; leafLabels=[];
    var n = preview ? Math.min(PREVIEW_PAGES,TOTAL) : TOTAL;
    for(var i=0;i<n;i++){
      var d=document.createElement("div"); d.className="page";
      var img=document.createElement("img");
      img.src=PAGES[i]; img.alt="Página "+(i+1); img.setAttribute("draggable","false");
      d.appendChild(img); book.appendChild(d); leafLabels.push(i+1);
    }
    if(preview && TOTAL>PREVIEW_PAGES){
      var g=document.createElement("div"); g.className="page page-gate";
      g.innerHTML=gateHTML(); book.appendChild(g); leafLabels.push("gate");
    }
  }
  function initFlip(start){
    busy=true; loader.style.display="flex";
    if(pf){ try{pf.destroy();}catch(e){} pf=null; }
    /* StPageFlip transforma o próprio #book em .stf__parent e o destroy() o
       REMOVE do DOM — remontar nele deixaria o livro num nó destacado (vazio).
       Por isso recriamos um #book fresco dentro do #stage a cada init. */
    var fresh=document.createElement("div"); fresh.id="book";
    if(book && book.parentNode){ book.parentNode.replaceChild(fresh, book); }
    else { stage.appendChild(fresh); }
    book=fresh;
    buildBookDOM(!unlocked);
    pf = new St.PageFlip(book,{
      width:545, height:771, size:"stretch",
      minWidth:140, maxWidth:2400, minHeight:198, maxHeight:3400,
      drawShadow:true, maxShadowOpacity:0.32,
      flippingTime: reduce?0:680,
      showCover:true, usePortrait:true, autoSize:true,
      mobileScrollSupport:false, swipeDistance:24,
      clickEventForward:true, disableFlipByClick:true, useMouseEvents:true
    });
    var wantStart = start||0;
    pf.loadFromHTML(book.querySelectorAll(".page"));
    pf.on("flip", function(e){ onFlip(e.data); });
    pf.on("changeOrientation", function(){ refreshUI(); });
    pf.on("init", function(){ busy=false; loader.style.display="none"; if(wantStart>0){ try{pf.turnToPage(wantStart);}catch(e){} } refreshUI(); });
    if(wantStart>0){ try{ pf.turnToPage(wantStart); }catch(e){} }
    setTimeout(function(){ busy=false; loader.style.display="none"; refreshUI(); }, 80);
  }

  /* ---------- gate ---------- */
  function landscape(){ return pf && pf.getOrientation && pf.getOrientation()==="landscape"; }
  function gateVisible(){
    if(unlocked || !pf) return false;
    var i=pf.getCurrentPageIndex();
    return leafLabels[i]==="gate" || (landscape() && leafLabels[i+1]==="gate");
  }
  function focusGate(){
    var el=$("leadEmail"); if(!el) return;
    setTimeout(function(){ try{el.focus({preventScroll:true});}catch(e){} }, reduce?0:520);
  }
  function leadMsg(m){ var el=$("leadMsg"); if(el) el.textContent=m||""; }
  function submitLead(){
    var em=$("leadEmail"), nm=$("leadName");
    var email = em ? em.value.trim() : "";
    if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ leadMsg("Digite um e-mail válido."); if(em) em.focus(); return; }
    var btn=$("leadBtn"); if(btn) btn.disabled=true;
    leadMsg("Liberando…");
    var done=function(){ unlock(); };
    if(LEAD_ENDPOINT){
      try{
        fetch(LEAD_ENDPOINT,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({name:nm?nm.value.trim():"",email:email,doc:DOC_TITLE,ts:Date.now()})})
          .then(done,done);
      }catch(e){ done(); }
    } else { done(); }
  }
  function unlock(){ unlocked=true; showGate(false); initFlip(PREVIEW_PAGES); }

  /* ---------- navigation ---------- */
  /* Virada nesta versão do StPageFlip (2.0.7):
     - Avançar: flipNext anima pelo canto "bottom" em portrait e "top" em
       landscape (sem o canto certo é no-op no celular) e atravessa o gate sem erro.
     - Voltar: o flipPrev da lib tem um bug — monta o ponto do canto com "x:10"
       FIXO, sem somar o deslocamento do livro (render.getRect().left). Quando o
       livro está centralizado/deslocado, esse ponto cai fora do livro,
       isPointOnCorners() dá falso e (com disableFlipByClick) o flip é abortado.
       Chamamos o flip() do controller com o ponto correto (left + 10) — é o flip
       de verdade, fluido, igual ao avançar. Fallback: turnToPrevPage. */
  function flipCorner(){ return landscape() ? "top" : "bottom"; }
  function navNext(){ if(pf && !busy) pf.flipNext(flipCorner()); }
  function navPrev(){
    if(!pf || busy) return;
    try{
      var fc = pf.getFlipController(), r = pf.getRender().getRect();
      if(!fc || !r){ pf.turnToPrevPage(); return; }
      fc.flip({ x: r.left + 10, y: flipCorner()==="top" ? 1 : r.height - 2 });
    }catch(e){ try{ pf.turnToPrevPage(); }catch(_){} }
  }
  function navFirst(){ if(pf && !busy) pf.turnToPage(0); afterJump(); }
  function navLast(){ if(pf && !busy) pf.turnToPage(pf.getPageCount()-1); afterJump(); }
  function goToPage(n){
    if(!pf||busy) return;
    n=clamp(Math.round(n),1,TOTAL);
    if(!unlocked && n>PREVIEW_PAGES){ pf.turnToPage(pf.getPageCount()-1); afterJump(); return; }
    pf.turnToPage(n-1); afterJump();
  }
  function afterJump(){ setTimeout(function(){ onFlip(pf?pf.getCurrentPageIndex():0); },20); }
  function onFlip(idx){
    refreshUI();
    var gv=gateVisible();
    showGate(gv);
    if(gv){ if(autoTimer) toggleAuto(false); if(isZoomed()) exitZoom(); }
  }

  /* ---------- zoom + pan ---------- */
  function isZoomed(){ return zoom>1.02 || tzoom>1.02; }
  function setZoomUI(on){ zoombar.hidden=!on; reader.classList.toggle("zoomed",on); paint(); }
  function enterZoom(){ if(gateVisible()) return; tzoom=ZOOM_START; setZoomUI(true); startRAF(); }
  function exitZoom(){ tzoom=1; tpanX=0; tpanY=0; startRAF(); }
  function zoomBy(d){ if(gateVisible()) return; tzoom=clamp(tzoom+d,MIN_ZOOM,MAX_ZOOM); if(tzoom>1.02) setZoomUI(true); else exitZoom(); startRAF(); }
  function overflow(){ var vw=viewport.clientWidth, vh=viewport.clientHeight; return {x:Math.max(0,(vw*zoom-vw)/2), y:Math.max(0,(vh*zoom-vh)/2)}; }
  function applyT(){ stage.style.transform="translate3d("+panX.toFixed(2)+"px,"+panY.toFixed(2)+"px,0) scale("+zoom.toFixed(4)+")"; }
  function followTo(cx,cy){
    var r=viewport.getBoundingClientRect();
    var nx=clamp((cx-r.left)/r.width,0,1), ny=clamp((cy-r.top)/r.height,0,1);
    var ov=overflow(); tpanX=ov.x*(1-2*nx); tpanY=ov.y*(1-2*ny); startRAF();
  }
  function tick(){
    zoom += (tzoom-zoom)*(reduce?1:0.2);
    var ov=overflow(); tpanX=clamp(tpanX,-ov.x,ov.x); tpanY=clamp(tpanY,-ov.y,ov.y);
    panX += (tpanX-panX)*(reduce?1:0.26);
    panY += (tpanY-panY)*(reduce?1:0.26);
    applyT();
    var settled = Math.abs(tzoom-zoom)<0.002 && Math.abs(tpanX-panX)<0.4 && Math.abs(tpanY-panY)<0.4;
    if(settled){
      zoom=tzoom; panX=tpanX; panY=tpanY; applyT();
      if(zoom<=1.001) setZoomUI(false);
      if(!dragging && !pinching){ raf=null; return; }
    }
    raf=requestAnimationFrame(tick);
  }
  function startRAF(){ if(raf==null) raf=requestAnimationFrame(tick); }
  function updatePanCursor(){ reader.classList.toggle("pan-hand",panMode==="hand"); reader.classList.toggle("pan-pointer",panMode==="pointer"); }

  /* pan capture */
  catcher.addEventListener("pointerdown",function(e){
    if(!isZoomed()||pinching) return;
    dragging=true; dsx=e.clientX; dsy=e.clientY; dpx=tpanX; dpy=tpanY;
    try{catcher.setPointerCapture(e.pointerId);}catch(_){}
    if(panMode==="pointer" && e.pointerType!=="touch") followTo(e.clientX,e.clientY);
  });
  catcher.addEventListener("pointermove",function(e){
    if(!isZoomed()||pinching) return;
    if(panMode==="hand"){ if(dragging){ tpanX=dpx+(e.clientX-dsx); tpanY=dpy+(e.clientY-dsy); startRAF(); } }
    else { if(e.pointerType==="touch" && !dragging) return; followTo(e.clientX,e.clientY); }
  });
  function endDrag(e){ dragging=false; try{catcher.releasePointerCapture(e.pointerId);}catch(_){} }
  catcher.addEventListener("pointerup",endDrag);
  catcher.addEventListener("pointercancel",endDrag);

  /* wheel: flip when not zoomed, zoom when zoomed */
  viewport.addEventListener("wheel",function(e){
    if(isZoomed()){
      e.preventDefault();
      tzoom=clamp(tzoom*Math.exp(-e.deltaY*0.0016),MIN_ZOOM,MAX_ZOOM);
      if(tzoom>1.02) setZoomUI(true); startRAF();
    } else {
      var d=e.deltaY||e.deltaX; if(Math.abs(d)<4) return;
      e.preventDefault();
      var now=Date.now(); if(now<wheelLock) return; wheelLock=now+430;
      if(d>0) navNext(); else navPrev();
    }
  },{passive:false});

  viewport.addEventListener("dblclick",function(e){
    if(gateVisible()) return;
    if(isZoomed()) exitZoom();
    else { enterZoom(); if(panMode==="pointer") followTo(e.clientX,e.clientY); }
  });

  /* pinch zoom (touch) */
  function tdist(t){ var dx=t[0].clientX-t[1].clientX, dy=t[0].clientY-t[1].clientY; return Math.sqrt(dx*dx+dy*dy); }
  viewport.addEventListener("touchstart",function(e){
    if(e.touches.length===2){ pinching=true; pinchD=tdist(e.touches); pinchZ=tzoom; }
  },{passive:true});
  viewport.addEventListener("touchmove",function(e){
    if(e.touches.length===2 && pinching){
      e.preventDefault();
      tzoom=clamp(pinchZ*tdist(e.touches)/pinchD,MIN_ZOOM,MAX_ZOOM);
      if(tzoom>1.02) setZoomUI(true); startRAF();
    }
  },{passive:false});
  viewport.addEventListener("touchend",function(e){
    if(e.touches.length<2){ pinching=false; if(tzoom<=1.02) exitZoom(); }
  });

  /* ---------- fullscreen / autoplay / share / search ---------- */
  function toggleFullscreen(){
    var d=document, el=reader;
    if(!d.fullscreenElement && !d.webkitFullscreenElement){
      var rq=el.requestFullscreen||el.webkitRequestFullscreen;
      if(rq){ try{ var p=rq.call(el); if(p&&p.catch) p.catch(function(){}); }catch(_){} }
    } else { var ex=d.exitFullscreen||d.webkitExitFullscreen; if(ex) ex.call(d); }
  }
  function onFsChange(){ exitZoom(); if(pf){ try{pf.update();}catch(_){} } paint(); setTimeout(refreshUI,80); }
  document.addEventListener("fullscreenchange",onFsChange);
  document.addEventListener("webkitfullscreenchange",onFsChange);

  function toggleAuto(force){
    var on = (force===undefined)? !autoTimer : force;
    if(on){
      if(autoTimer) return;
      autoTimer=setInterval(function(){
        if(!pf){return;}
        if(pf.getCurrentPageIndex()>=pf.getPageCount()-1){ toggleAuto(false); return; }
        pf.flipNext("top");
      }, AUTOPLAY_MS);
    } else { clearInterval(autoTimer); autoTimer=null; }
    paint();
  }

  function copyText(t){
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).catch(function(){}); return; }
    var a=document.createElement("textarea"); a.value=t; a.style.position="fixed"; a.style.opacity="0";
    document.body.appendChild(a); a.select(); try{document.execCommand("copy");}catch(_){} document.body.removeChild(a);
  }
  var toastT=null;
  function toast(m){ var t=$("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(function(){t.classList.remove("show");},1800); }
  function doShare(){
    var url=SHARE_URL||location.href;
    if(navigator.share){ navigator.share({title:DOC_TITLE,url:url}).catch(function(){}); }
    else { copyText(url); toast("Link copiado"); }
  }
  function doEmail(){
    var url=SHARE_URL||location.href;
    location.href="mailto:?subject="+encodeURIComponent(DOC_TITLE)+"&body="+encodeURIComponent("Leitura recomendada: "+url);
  }

  function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
  function toggleSearch(){ if(searchbar.hidden) openSearch(); else closeSearch(); }
  function openSearch(){ searchbar.hidden=false; var i=$("searchInput"); i.value=""; $("searchCount").textContent=""; hits=[]; hitIdx=-1; setTimeout(function(){i.focus();},20); }
  function closeSearch(){ searchbar.hidden=true; }
  function runSearch(q){
    q=norm(q.trim()); hits=[]; hitIdx=-1;
    var c=$("searchCount");
    if(q.length<2){ c.textContent=""; return; }
    var locked=0;
    for(var i=0;i<TOTAL;i++){
      if(norm(PAGE_TEXT[i]).indexOf(q)>=0){
        if(!unlocked && (i+1)>PREVIEW_PAGES) locked++;
        else hits.push(i);
      }
    }
    if(hits.length){ hitIdx=0; c.textContent="1/"+hits.length+(locked?" (+"+locked+" 🔒)":""); pf.turnToPage(hits[0]); afterJump(); }
    else if(locked){ c.textContent="🔒 só na versão completa"; }
    else c.textContent="nada encontrado";
  }
  function searchStep(d){
    if(!hits.length) return;
    hitIdx=(hitIdx+d+hits.length)%hits.length;
    $("searchCount").textContent=(hitIdx+1)+"/"+hits.length;
    pf.turnToPage(hits[hitIdx]); afterJump();
  }

  /* ---------- UI refresh ---------- */
  function setDisabled(act,dis){ qa('[data-act="'+act+'"]').forEach(function(el){ el.disabled=dis; el.classList.toggle("off",dis); }); }
  function paint(){
    updatePanCursor();
    var fs=document.fullscreenElement||document.webkitFullscreenElement;
    qa('[data-act="fullscreen"]').forEach(function(b){ b.innerHTML=svg(fs?I.compress:I.expand); });
    qa('[data-act="play"]').forEach(function(b){ b.innerHTML=svg(autoTimer?I.pause:I.play); b.setAttribute("aria-pressed",autoTimer?"true":"false"); b.title=autoTimer?"Pausar apresentação":"Apresentação automática"; });
    qa('[data-act="panToggle"]').forEach(function(b){ b.innerHTML=svg(panMode==="hand"?I.hand:I.pointer); b.title=(panMode==="hand"?"Modo arrastar (mãozinha) — clique para seguir o cursor":"Modo seguir o cursor — clique para arrastar"); });
  }
  function refreshUI(){
    if(!pf) return;
    var idx=pf.getCurrentPageIndex(), count=pf.getPageCount(), land=landscape();
    var lbl;
    if(leafLabels[idx]==="gate"){ lbl="🔒 Prévia"; }
    else {
      var a=leafLabels[idx];
      var b=(land && leafLabels[idx+1] && leafLabels[idx+1]!=="gate")?leafLabels[idx+1]:null;
      lbl=(unlocked?"":"Prévia · ")+(b?(a+"–"+b):a)+" / "+TOTAL;
    }
    var pl=$("pageLabel"); if(pl) pl.textContent=lbl;
    var atStart=idx<=0, atEnd=idx>=count-1, gv=gateVisible();
    setDisabled("first",atStart); setDisabled("prev",atStart);
    setDisabled("next",atEnd||gv); setDisabled("last",atEnd||gv);
    paint();
  }

  /* ---------- pager input ---------- */
  function openPagerInput(){
    var pl=$("pageLabel"); if(!pl) return;
    var cur=pf?(pf.getCurrentPageIndex()+1):1;
    var inp=document.createElement("input"); inp.type="number"; inp.min="1"; inp.max=String(TOTAL);
    inp.value=String(Math.min(cur,TOTAL)); inp.setAttribute("aria-label","Ir para a página");
    pager.replaceChild(inp,pl); inp.focus(); inp.select();
    function close(commit){
      if(commit){ var n=parseInt(inp.value,10); if(n>=1&&n<=TOTAL) goToPage(n); }
      var b=document.createElement("button"); b.id="pageLabel"; b.setAttribute("data-act","pager"); b.setAttribute("aria-label","Ir para a página");
      if(inp.parentNode===pager) pager.replaceChild(b,inp); refreshUI();
    }
    inp.addEventListener("keydown",function(e){ if(e.key==="Enter"){e.preventDefault();close(true);} else if(e.key==="Escape"){e.preventDefault();close(false);} });
    inp.addEventListener("blur",function(){ close(true); });
  }

  /* ---------- delegated actions ---------- */
  function act(a){
    switch(a){
      case "zoomIn": if(isZoomed()) zoomBy(ZOOM_STEP); else enterZoom(); break;
      case "zPlus": zoomBy(ZOOM_STEP); break;
      case "zMinus": zoomBy(-ZOOM_STEP); break;
      case "zFit": case "zClose": exitZoom(); break;
      case "panToggle": panMode=(panMode==="hand")?"pointer":"hand"; updatePanCursor(); paint(); break;
      case "first": navFirst(); break;
      case "prev": navPrev(); break;
      case "next": navNext(); break;
      case "last": navLast(); break;
      case "play": toggleAuto(); break;
      case "search": toggleSearch(); break;
      case "share": doShare(); break;
      case "email": doEmail(); break;
      case "fullscreen": toggleFullscreen(); break;
      case "pager": openPagerInput(); break;
      case "searchPrev": searchStep(-1); break;
      case "searchNext": searchStep(1); break;
      case "searchClose": closeSearch(); break;
    }
  }
  document.addEventListener("click",function(e){
    var t=e.target.closest ? e.target.closest("[data-act]") : null;
    if(t){ act(t.getAttribute("data-act")); return; }
    if(e.target && (e.target.id==="leadBtn")) submitLead();
  });
  document.addEventListener("keydown",function(e){
    var tag=e.target&&e.target.tagName;
    if(tag==="INPUT"||tag==="TEXTAREA"){
      if(e.target.id==="searchInput"){
        if(e.key==="Enter"){ e.preventDefault(); e.shiftKey?searchStep(-1):searchStep(1); }
        else if(e.key==="Escape"){ closeSearch(); }
        else { clearTimeout(searchT); searchT=setTimeout(function(){ runSearch(e.target.value); },180); }
      }
      if(e.target.id==="leadEmail" && e.key==="Enter"){ e.preventDefault(); submitLead(); }
      return;
    }
    switch(e.key){
      case "ArrowRight": case "PageDown": navNext(); break;
      case "ArrowLeft": case "PageUp": navPrev(); break;
      case "Home": navFirst(); break;
      case "End": navLast(); break;
      case "+": case "=": zoomBy(ZOOM_STEP); break;
      case "-": case "_": zoomBy(-ZOOM_STEP); break;
      case "f": case "F": toggleFullscreen(); break;
      case "/": e.preventDefault(); openSearch(); break;
      case "Escape": if(!searchbar.hidden) closeSearch(); else if(isZoomed()) exitZoom(); break;
    }
  });
  $("searchInput").addEventListener("input",function(e){ clearTimeout(searchT); searchT=setTimeout(function(){ runSearch(e.target.value); },180); });

  /* ---------- resize / viewport ----------
     No iPhone o Safari não tem Fullscreen API e, em paisagem, as barras do
     navegador reduzem a área visível; com altura de layout o rodapé da página
     ficava atrás da barra, inalcançável. Fixamos a altura do #reader na altura
     REALMENTE visível (innerHeight) para a página caber inteira. */
  function fitViewport(){
    try{ reader.style.height = window.innerHeight + "px"; }catch(_){}
    if(pf){ try{ pf.update(); }catch(_){} }
  }
  var rzT=null;
  function onResize(){
    fitViewport();
    clearTimeout(rzT);
    rzT=setTimeout(function(){ zoom=1;tzoom=1;panX=panY=tpanX=tpanY=0; applyT(); setZoomUI(false); fitViewport(); refreshUI(); },150);
  }
  window.addEventListener("resize",onResize);
  window.addEventListener("orientationchange",function(){ fitViewport(); setTimeout(fitViewport,300); });

  /* ---------- boot ---------- */
  updatePanCursor();
  $("gate").innerHTML = gateCardHTML();   /* monta o form do overlay uma vez */
  fitViewport();
  /* iPhone não tem Fullscreen API — o botão "Tela cheia" não faria nada; esconde. */
  if(!(document.documentElement.requestFullscreen||document.documentElement.webkitRequestFullscreen)){
    qa('[data-act="fullscreen"]').forEach(function(b){ b.style.display="none"; });
  }
  function showFatal(msg){
    try{
      if(loader){
        loader.innerHTML='<div style="max-width:320px;margin:auto;text-align:center;padding:24px;'+
          'font:15px/1.5 -apple-system,system-ui,sans-serif;color:#283244">'+msg+'</div>';
        loader.style.display='flex';
      }
    }catch(_){}
  }
  /* Diagnóstico: mostra os fatos do aparelho em vez de adivinhar. */
  function diag(extra){
    var libTag = document.querySelector('script[src*="page-flip"]');
    return "<div style='text-align:left;font:12px/1.5 monospace;word-break:break-all'>"+
      "St = "+(typeof St)+"<br>"+
      "lib carregou erro = "+(window.__stfErr?"SIM (falhou)":"não")+"<br>"+
      "tag da lib presente = "+(libTag?"sim":"NÃO")+"<br>"+
      (extra?("motivo = "+extra+"<br>"):"")+
      "UA = "+(navigator.userAgent||"?")+
      "</div>";
  }
  /* Rede de segurança: o #loader nunca pode girar para sempre. */
  var loaderSafety=setTimeout(function(){
    if(!book || !book.querySelector(".page")){
      showFatal("<b>Leitor não abriu — diagnóstico:</b><br><br>"+diag("livro não montou em 9s"));
    }
  },9000);
  try{
    if(typeof St==="undefined" || !St || !St.PageFlip){ throw new Error("St indefinido"); }
    initFlip(0);
  }catch(e){
    clearTimeout(loaderSafety);
    showFatal("<b>Leitor não abriu — diagnóstico:</b><br><br>"+diag(e&&e.message?e.message:"erro"));
  }
  })();
  </script>
</body>
</html>
